                                <span className="font-bold text-yellow-400">{p.score} PT</span>
                            </div>
                        ))}
                    </div>

                    {room.hostId === user.uid && (
                        <div className="flex gap-4 mt-6">
                            <button onClick={startRound} className="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold">
                                Nuova Domanda
                            </button>
                             <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-gray-600 hover:bg-gray-500 px-6 py-3 rounded-xl font-bold">
                                Lobby
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [roomId, setRoomId] = useState(null);
            const [inputRoomId, setInputRoomId] = useState("");
            const [selectedChar, setSelectedChar] = useState(null);
            const [view, setView] = useState('HOME');
            const [initialHp, setInitialHp] = useState(50); // Local state for Host slider
            const [showCharSelector, setShowCharSelector] = useState(false); // Modal for lobby

            const { data: room, loading } = useRoom(roomId, user);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                    else await auth.signInAnonymously();
                };
                initAuth();
                auth.onAuthStateChanged(u => { if(u) setUser(u); });
            }, []);

            const createRoom = async () => {
                if(!selectedChar) return alert("Seleziona un personaggio!");
                const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(newRoomId);
                
                await roomRef.set({
                    hostId: user.uid,
                    status: 'LOBBY',
                    selectedGame: 'SURVIVAL',
                    config: { initialHp: 50 },
                    players: [{
                        id: user.uid,
                        name: selectedChar.name,
                        img: selectedChar.img,
                        isCpu: false,
                        hp: 50,
                        score: 0
                    }],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setRoomId(newRoomId);
            };

            const joinRoom = async () => {
                if(!selectedChar) return alert("Seleziona un personaggio!");
                if(!inputRoomId) return alert("Inserisci codice stanza");
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(inputRoomId.toUpperCase());
                try {
                    await db.runTransaction(async (t) => {
                        const doc = await t.get(roomRef);
                        if (!doc.exists) throw "Stanza non trovata";
                        const data = doc.data();
                        if (data.status !== 'LOBBY') throw "Partita già iniziata";
                        
                        const newPlayers = [...data.players, {
                            id: user.uid,
                            name: selectedChar.name,
                            img: selectedChar.img,
                            isCpu: false,
                            hp: 50,
                            score: 0
                        }];
                        t.update(roomRef, { players: newPlayers });
                    });
                    setRoomId(inputRoomId.toUpperCase());
                } catch (e) { alert(e); }
            };

            const addCpu = async () => {
                if (!room || room.hostId !== user.uid) return;
                const usedNames = room.players.map(p => p.name);
                const available = CHARACTERS.filter(c => !usedNames.includes(c.name));
                if(available.length === 0) return alert("Finiti i personaggi!");
                const randomChar = available[Math.floor(Math.random() * available.length)];
                
                const newPlayers = [...room.players, {
                    id: 'CPU_' + Date.now(),
                    name: randomChar.name,
                    img: randomChar.img,
                    isCpu: true,
                    hp: 50,
                    score: 0
                }];
                await updateRoom({ players: newPlayers });
            };

            const removeCpu = async (cpuId) => {
                if (!room || room.hostId !== user.uid) return;
                const newPlayers = room.players.filter(p => p.id !== cpuId);
                await updateRoom({ players: newPlayers });
            };

            const changeCharacter = async (char) => {
                setSelectedChar(char);
                setShowCharSelector(false);
                // If in lobby, update player data
                if (room && roomId) {
                    const newPlayers = room.players.map(p => p.id === user.uid ? { ...p, name: char.name, img: char.img } : p);
                    await updateRoom({ players: newPlayers });
                }
            };

            const startGame = async () => {
                if (!room || room.hostId !== user.uid) return;
                const firstPlayerIndex = Math.floor(Math.random() * room.players.length);
                let gameData = {
                    currentTurnIndex: firstPlayerIndex,
                    round: 1,
                    lastAction: "Partita Iniziata!",
                    roundSummary: null // Initialize as null to prevent undefined error
                };

                let hpToSet = (room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE') ? initialHp : 50;
                // Save config to firestore if it changed
                if(room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE') {
                    await updateRoom({ config: { initialHp: hpToSet } });
                }

                let resetPlayers = room.players.map(p => ({
                    ...p,
                    hp: hpToSet, 
                    score: 0,
                    pos: {x:0, y:0},
                    status: 'ACTIVE',
                    eliminatedRound: null,
                    damageTakenRound: 0 // Init
                }));

                if(room.selectedGame === 'CLICK_RACE') {
                    gameData.raceStatus = 'READY';
                    gameData.timeLeft = 10;
                }

                if(room.selectedGame === 'HOT_POTATO') {
                    gameData.explosionTime = Date.now() + Math.floor(Math.random() * 15000) + 10000;
                }

                if(room.selectedGame === 'REACTION') {
                    gameData.status = 'WAITING';
                    gameData.roundWinner = null;
                }

                if(room.selectedGame === 'MATH') {
                    gameData.question = null;
                    gameData.roundWinner = null;
                }

                if(room.selectedGame === 'CURSED_DICE') {
                    gameData.lastRoll = null;
                }
                
                if(room.selectedGame === 'DETONATOR') {
                    gameData.risk = 10;
                }

                await updateRoom({
                    status: 'PLAYING',
                    players: resetPlayers,
                    gameData: gameData
                });
            };

            const updateRoom = async (data) => {
                if(!roomId) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId).update(data);
            };

            // Character Selector Modal
            const CharacterSelector = () => (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                    <div className="bg-[#1a1a2e] p-6 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto border border-white/20">
                        <h2 className="text-2xl font-bold mb-4">Scegli Personaggio</h2>
                        <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">
                            {CHARACTERS.map((char, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => changeCharacter(char)}
                                    className={`cursor-pointer rounded-lg overflow-hidden border-2 transition-all character-card relative aspect-square hover:border-pink-500`}
                                >
                                    <img src={char.img} alt={char.name} className="w-full h-full object-cover" loading="lazy" />
                                    <div className="absolute bottom-0 w-full bg-black/60 text-[9px] text-white text-center py-1 truncate px-1">{char.name}</div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setShowCharSelector(false)} className="mt-4 bg-gray-600 px-4 py-2 rounded">Chiudi</button>
                    </div>
                </div>
            );

            if (!user) return <div className="h-screen flex items-center justify-center text-white">Caricamento PartyVerse...</div>;

            // Initial Home Screen
            if (!roomId) {
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center">
                        <header className="mb-8 text-center">
                            <h1 className="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2">PARTYVERSE</h1>
                            <p className="text-gray-400">Roster Royale Edition</p>
                        </header>

                        <div className="w-full max-w-4xl glass-panel rounded-2xl p-6 mb-8">
                            <h2 className="text-xl mb-4 font-bold flex items-center gap-2"><Users /> Seleziona il tuo Campione</h2>
                            <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 max-h-[40vh] overflow-y-auto pr-2">
                                {CHARACTERS.map((char, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => setSelectedChar(char)}
                                        className={`cursor-pointer rounded-lg overflow-hidden border-2 transition-all character-card relative aspect-square ${selectedChar?.name === char.name ? 'border-pink-500 ring-2 ring-pink-500' : 'border-transparent opacity-70 hover:opacity-100'}`}
                                    >
                                        <img src={char.img} alt={char.name} className="w-full h-full object-cover" loading="lazy" />
                                        <div className="absolute bottom-0 w-full bg-black/60 text-[9px] text-white text-center py-1 truncate px-1">
                                            {char.name}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row gap-6 w-full max-w-2xl">
                            <div className="flex-1 glass-panel p-6 rounded-xl flex flex-col items-center">
                                <h3 className="text-xl font-bold mb-4">Crea Partita</h3>
                                <button 
                                    onClick={createRoom}
                                    className="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-lg font-bold hover:scale-105 transition-transform"
                                >
                                    CREA STANZA
                                </button>
                            </div>
                            <div className="flex-1 glass-panel p-6 rounded-xl flex flex-col items-center">
                                <h3 className="text-xl font-bold mb-4">Unisciti</h3>
                                <input 
                                    type="text" 
                                    placeholder="CODICE STANZA" 
                                    value={inputRoomId}
                                    onChange={e => setInputRoomId(e.target.value.toUpperCase())}
                                    className="w-full bg-black/30 border border-white/20 rounded p-2 mb-4 text-center tracking-widest uppercase font-mono"
                                />
                                <button 
                                    onClick={joinRoom}
                                    className="w-full py-3 bg-gradient-to-r from-pink-600 to-red-600 rounded-lg font-bold hover:scale-105 transition-transform"
                                >
                                    ENTRA
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading || !room) return <div className="h-screen flex items-center justify-center">Sincronizzazione...</div>;

            // --- LOBBY VIEW ---
            if (room.status === 'LOBBY') {
                const isHost = room.hostId === user.uid;
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center">
                         {showCharSelector && <CharacterSelector />}
                        
                        <div className="w-full max-w-4xl flex justify-between items-center mb-8 glass-panel p-4 rounded-xl">
                            <div>
                                <h2 className="text-gray-400 text-sm">CODICE STANZA</h2>
                                <h1 className="text-3xl font-mono font-bold tracking-widest text-pink-400 select-all">{roomId}</h1>
                            </div>
                            <button onClick={() => setRoomId(null)} className="text-sm bg-gray-700 px-3 py-1 rounded">Esci</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
                            {/* Players List */}
                            <div className="glass-panel p-6 rounded-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold">Giocatori ({room.players.length})</h3>
                                    {isHost && (
                                        <button onClick={addCpu} className="bg-purple-600 hover:bg-purple-500 px-3 py-1 rounded text-sm flex items-center gap-1">
                                            <UserPlus size={16}/> CPU
                                        </button>
                                    )}
                                </div>
                                <div className="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto">
                                    {room.players.map((p, i) => (
                                        <div key={i} className="flex items-center gap-3 bg-white/5 p-2 rounded-lg relative group">
                                            <div className="w-10 h-10 rounded-full overflow-hidden border border-white/30 cursor-pointer" onClick={() => p.id === user.uid && setShowCharSelector(true)}>
                                                <img src={p.img} className="w-full h-full object-cover"/>
                                            </div>
                                            <div className="truncate flex-1">
                                                <div className="font-bold text-sm truncate">{p.name}</div>
                                                {p.id === room.hostId && <span className="text-[10px] bg-yellow-600 px-1 rounded text-white">HOST</span>}
                                                {p.isCpu && <span className="text-[10px] bg-purple-600 px-1 rounded text-white ml-1">CPU</span>}
                                            </div>
                                            {p.id === user.uid && (
                                                <button onClick={() => setShowCharSelector(true)} className="absolute right-2 top-2 bg-blue-500 p-1 rounded-full opacity-50 hover:opacity-100">
                                                    <Edit size={12}/>
                                                </button>
                                            )}
                                            {isHost && p.isCpu && (
                                                <button onClick={() => removeCpu(p.id)} className="absolute right-2 top-2 bg-red-500 p-1 rounded-full opacity-0 group-hover:opacity-100">
                                                    <Trash2 size={12}/>
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Game Settings */}
                            <div className="glass-panel p-6 rounded-xl flex flex-col justify-between">
                                <div>
                                    <h3 className="text-xl font-bold mb-4">Configurazione Gioco</h3>
                                    {isHost ? (
                                        <div className="flex flex-col gap-3 max-h-[50vh] overflow-y-auto pr-2">
                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'SURVIVAL' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'SURVIVAL' ? 'bg-red-500/20 border-red-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-red-500 p-2 rounded-full"><Skull size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">L'Ultimo Sopravvissuto</div>
                                                    <div className="text-xs opacity-70">Eliminazione • Dadi • Fortuna</div>
                                                </div>
                                            </button>

                                             <button 
                                                onClick={() => updateRoom({ selectedGame: 'CURSED_DICE' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'CURSED_DICE' ? 'bg-purple-500/20 border-purple-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-purple-500 p-2 rounded-full"><Dices size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Dadi Maledetti</div>
                                                    <div className="text-xs opacity-70">Caos • Imprevedibile • RNG</div>
                                                </div>
                                            </button>
                                            
                                            {(room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE') && (
                                                <div className="bg-white/5 p-3 rounded-lg border border-white/10">
                                                    <label className="text-sm text-gray-300 block mb-2">HP Iniziali: <span className="font-bold text-white">{initialHp}</span></label>
                                                    <input 
                                                        type="range" 
                                                        min="10" 
                                                        max="50" 
                                                        value={initialHp} 
                                                        onChange={(e) => setInitialHp(parseInt(e.target.value))}
                                                        className="w-full accent-red-500"
                                                    />
                                                </div>
                                            )}

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'DETONATOR' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'DETONATOR' ? 'bg-red-700/20 border-red-700' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-red-700 p-2 rounded-full"><Power size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Il Detonatore</div>
                                                    <div className="text-xs opacity-70">Rischio • Eliminazione • Fortuna</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'CLICK_RACE' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'CLICK_RACE' ? 'bg-pink-500/20 border-pink-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-pink-500 p-2 rounded-full"><Zap size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Corsa dei Click</div>
                                                    <div className="text-xs opacity-70">Riflessi • Click • Caos</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'HOT_POTATO' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'HOT_POTATO' ? 'bg-orange-500/20 border-orange-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-orange-500 p-2 rounded-full"><Bomb size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Bomba a Tempo</div>
                                                    <div className="text-xs opacity-70">Eliminazione • Panico</div>
                                                </div>
                                            </button>

                                             <button 
                                                onClick={() => updateRoom({ selectedGame: 'REACTION' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'REACTION' ? 'bg-green-500/20 border-green-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-green-500 p-2 rounded-full"><Eye size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Riflessi Lampo</div>
                                                    <div className="text-xs opacity-70">Reazione • Attenzione</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'MATH' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'MATH' ? 'bg-indigo-500/20 border-indigo-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-indigo-500 p-2 rounded-full"><Brain size={20} /></div>
                                                <div className="text-left">
                                                    <div className="font-bold">Matematica Folle</div>
                                                    <div className="text-xs opacity-70">Logica • Velocità</div>
                                                </div>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 opacity-60 italic">
                                            L'host sta scegliendo il gioco...
                                        </div>
                                    )}
                                </div>
                                
                                {isHost ? (
                                    <button 
                                        onClick={startGame}
                                        className="w-full mt-6 py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold text-xl shadow-lg flex items-center justify-center gap-2"
                                    >
                                        <Play /> AVVIA PARTITA
                                    </button>
                                ) : (
                                    <div className="text-center text-sm animate-pulse mt-6">In attesa dell'Host...</div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- GAME VIEW ---
            if (room.selectedGame === 'SURVIVAL') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><SurvivalGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'CURSED_DICE') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><CursedDiceGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'DETONATOR') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><DetonatorGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'CLICK_RACE') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><ClickRaceGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'HOT_POTATO') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><HotPotatoGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'REACTION') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><ReactionGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'MATH') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><MathGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else {
                return <div>Errore: Gioco sconosciuto</div>;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
