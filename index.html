    <style>
        body { background-color: #1a1a2e; color: #e94560; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .character-card:hover { transform: scale(1.05); border-color: #e94560; }
        .dice-roll { animation: roll 0.5s ease-in-out infinite; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
        
        /* D-Pad Styles */
        .dpad-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.2s; }
        .dpad-btn:active { background: rgba(233, 69, 96, 0.5); transform: scale(0.95); }

        /* Click Race Button */
        .click-btn:active { transform: scale(0.95); background-color: #ff2e63; }

        /* Animation for Bomb */
        .bomb-shake { animation: shake 0.5s infinite; }
        @keyframes shake { 
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .pulse-red { animation: pulse-red 1s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        
        /* Shield Animation Potenziata con Bagliore Continuo */
        .shield-pulse { 
            animation: shieldPulse 1.5s infinite ease-in-out alternate; 
            border-color: #3b82f6 !important;
        }
        @keyframes shieldPulse {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5), inset 0 0 5px rgba(59, 130, 246, 0.2); }
            100% { box-shadow: 0 0 20px rgba(59, 130, 246, 1), inset 0 0 15px rgba(59, 130, 246, 0.6); }
        }

        /* Podium Neon Styles & Glows */
        .podium-gold {
            background: linear-gradient(180deg, rgba(234, 179, 8, 0.25) 0%, rgba(234, 179, 8, 0.05) 100%);
            border: 2px solid #eab308;
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.5), inset 0 0 15px rgba(234, 179, 8, 0.2);
        }
        .podium-silver {
            background: linear-gradient(180deg, rgba(148, 163, 184, 0.25) 0%, rgba(148, 163, 184, 0.05) 100%);
            border: 2px solid #94a3b8;
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.4), inset 0 0 10px rgba(148, 163, 184, 0.15);
        }
        .podium-bronze {
            background: linear-gradient(180deg, rgba(180, 83, 9, 0.25) 0%, rgba(180, 83, 9, 0.05) 100%);
            border: 2px solid #b45309;
            box-shadow: 0 0 15px rgba(180, 83, 9, 0.4), inset 0 0 8px rgba(180, 83, 9, 0.1);
        }
        .animate-rise {
            animation: riseUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }
        @keyframes riseUp {
            0% { transform: translateY(80px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Screen Shake (Terremoto Visivo) */
        .screen-shake {
            animation: screenShake 0.4s ease-in-out;
        }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-4px, -2px) rotate(-0.5deg); }
            20%, 40%, 60%, 80% { transform: translate(4px, 2px) rotate(0.5deg); }
        }

        /* Neon Particle Sparks (Scintille di Danno) */
        .damage-spark {
            position: absolute;
            pointer-events: none;
            width: 6px;
            height: 6px;
            background-color: #ff2a85;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff2a85, 0 0 15px #e94560;
            animation: sparkOut 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes sparkOut {
            0% { transform: translate(-50%, -50%) translate(0, 0) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Cyberpunk Cards Animations */
        .cyber-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            cursor: pointer;
        }
        .cyber-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Matrix/Grid digital rain scanlines */
        .scanlines {
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.06),
                rgba(0, 255, 0, 0.02),
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 6px 100%;
        }
    </style>

        const { useState, useEffect, useRef } = React;
        
        // Hook customizzato per sincronizzare in tempo reale lo stato delle stanze tramite Firestore
        const useRoom = (roomId, user) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!roomId || !user) {
                    setData(null);
                    setLoading(false);
                    return;
                }
                setLoading(true);
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
                const unsubscribe = docRef.onSnapshot(
                    (doc) => {
                        if (doc.exists) {
                            setData(doc.data());
                        } else {
                            setData(null);
                        }
                        setLoading(false);
                    },
                    (error) => {
                        console.error("Errore nel recupero della stanza:", error);
                        setLoading(false);
                    }
                );
                return () => unsubscribe();
            }, [roomId, user]);

            return { data, loading };
        };

        const playSynthSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'shield') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.6);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.6);
                } else if (type === 'attack') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.5);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'heal') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(260, ctx.currentTime);
                    osc.frequency.setValueAtTime(520, ctx.currentTime + 0.15);
                    osc.frequency.setValueAtTime(1040, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'sabotage') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(45, ctx.currentTime + 0.6);
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.6);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch(e) {
                console.warn("Audio Context blocked by browser autoplay rules");
            }
        };

          { id: 11, name: "Calcio", type: "ATTACK", icon: "🔴", desc: "Infligge 3 danni e manda in frantumi lo scudo/invulnerabilità avversaria!", color: "border-red-500 bg-red-950/40 text-red-200" },
          { id: 12, name: "Firewall Laser", type: "BUFF", icon: "🔵", desc: "Ti rende completamente invulnerabile per l'intero round.", color: "border-blue-500 bg-blue-950/40 text-blue-200" },
          { id: 13, name: "Scudo a Specchio", type: "BUFF", icon: "🔵", desc: "Se vieni attaccato in questo round, rifletti interamente i danni al mittente.", color: "border-blue-500 bg-blue-950/40 text-blue-200" },
          { id: 14, name: "Nano-Iniezione", type: "HEAL", icon: "🟢", desc: "Recuperi immediatamente 8 HP.", color: "border-green-500 bg-green-950/40 text-green-200" },
          { id: 15, name: "Patch di Sicurezza", type: "HEAL", icon: "🟢", desc: "Cura 5 HP e rimuove qualsiasi effetto negativo (Spine o Malus).", color: "border-green-500 bg-green-950/40 text-green-200" },
          { id: 16, name: "Barriera Condivisa", type: "BUFF_SELECT", icon: "🔵", desc: "Protegge te e un altro giocatore a scelta per 1 round.", color: "border-blue-500 bg-blue-950/40 text-blue-200" },
          { id: 17, name: "Rigeneratore di Celle", type: "BUFF", icon: "🟢", desc: "Cura +2 HP all'inizio di ogni tuo turno per i prossimi 4 turni.", color: "border-green-500 bg-green-950/40 text-green-200" },
          { id: 18, name: "DDoS Attack", type: "SABOTAGE", icon: "🟡", desc: "Impedisce a un giocatore a scelta di giocare carte nel suo prossimo turno.", color: "border-yellow-500 bg-yellow-950/40 text-yellow-200" },
          { id: 19, name: "Riavvio Forzato", type: "SABOTAGE", icon: "🟣", desc: "Costringe un avversario a scartare la mano e pescare 3 nuove carte.", color: "border-purple-500 bg-purple-950/40 text-purple-200" },
          { id: 20, name: "Keylogger", type: "SABOTAGE", icon: "🟣", desc: "Spia la mano dell'avversario a scelta per i prossimi 2 round.", color: "border-purple-500 bg-purple-950/40 text-purple-200" },
          { id: 21, name: "Roulette Russa", type: "RNG", icon: "🌀", desc: "Dado virtuale: 1-3 subisci 5 danni tu, 4-6 subisce 10 danni l'avversario.", color: "border-cyan-500 bg-cyan-950/40 text-cyan-200" },
          { id: 22, name: "Tempesta EMP", type: "RNG_ALL", icon: "🌀", desc: "Disattiva i dati olografici! Per un round nessuno può vedere i nomi delle proprie carte.", color: "border-cyan-500 bg-cyan-950/40 text-cyan-200" },
          { id: 23, name: "L'Ira dei Pincher", type: "RNG_ALL", icon: "🌀", desc: "Scatena 4 effetti casuali diversi sui 4 giocatori della partita.", color: "border-cyan-500 bg-cyan-950/40 text-cyan-200" },
          { id: 24, name: "Specchio del Destino", type: "RNG_ALL", icon: "🌀", desc: "Chi ha attualmente più HP scambia la sua vita con chi ne ha meno.", color: "border-cyan-500 bg-cyan-950/40 text-cyan-200" }
        ];

        // Componente di gioco per la modalità Sopravvivenza Classica
        const SurvivalGame = ({ room, user, updateRoom }) => {
            const [rolling, setRolling] = useState(false);
            const [diceValue, setDiceValue] = useState(null);
            
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer?.id === user.uid;
            const isHost = room.hostId === user.uid;

            const handleRoll = async () => {
                if (rolling) return;
                setRolling(true);
                playSynthSound('click');

                // Effetto roll dei dadi
                for (let i = 0; i < 6; i++) {
                    setDiceValue(Math.floor(Math.random() * 6) + 1);
                    await new Promise(r => setTimeout(r, 100));
                }

                const roll = Math.floor(Math.random() * 6) + 1;
                setDiceValue(roll);
                await new Promise(r => setTimeout(r, 500));

                let newPlayers = [...room.players];
                const me = newPlayers[room.gameData.currentTurnIndex];
                let logMsg = "";

                if (roll === 1) {
                    me.hp = Math.max(0, me.hp - 10);
                    logMsg = `💥 ${me.name} ha rollato 1 e ha subito 10 danni!`;
                    playSynthSound('attack');
                } else if (roll === 6) {
                    const max = room.config?.initialHp || 50;
                    me.hp = Math.min(max, me.hp + 5);
                    logMsg = `💖 ${me.name} ha rollato 6 e ha recuperato 5 HP!`;
                    playSynthSound('heal');
                } else {
                    logMsg = `🎲 ${me.name} ha rollato ${roll}. Tutto sicuro!`;
                    playSynthSound('click');
                }

                if (me.hp <= 0) {
                    me.hp = 0;
                    me.status = 'ELIMINATED';
                    me.eliminatedRound = room.gameData.round;
                    logMsg += ` 💀 ${me.name} è stato eliminato!`;
                }

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;
                let nextIndex = room.gameData.currentTurnIndex;
                let nextRound = room.gameData.round || 1;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id || null;
                } else {
                    let loops = 0;
                    do {
                        nextIndex = (nextIndex + 1) % newPlayers.length;
                        if (nextIndex === 0) nextRound++;
                        loops++;
                    } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                }

                setRolling(false);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    winnerId: winnerId,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: nextRound,
                        lastAction: logMsg
                    }
                });
            };

            useEffect(() => {
                if (currentPlayer?.isCpu && isHost && room.status === 'PLAYING' && !rolling) {
                    const timer = setTimeout(() => {
                        handleRoll();
                    }, 1500);
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl text-center">
                    <div className="text-2xl font-bold text-red-500 flex items-center gap-2 uppercase tracking-wider">
                        <Skull /> L'Ultimo Sopravvissuto
                    </div>
                    <div className="glass-panel p-4 rounded text-center w-full min-h-[60px] flex flex-col items-center justify-center">
                        <div className="text-lg">{room.gameData.lastAction || "Pronto a tirare i dadi della sorte?"}</div>
                    </div>

                    <div className="relative w-48 h-48 flex items-center justify-center">
                        {isMyTurn && room.status === 'PLAYING' ? (
                            <button 
                                onClick={handleRoll}
                                disabled={rolling}
                                className={`w-36 h-36 rounded-2xl border-4 bg-gradient-to-br from-pink-600 to-purple-800 border-pink-500 text-white font-extrabold text-5xl flex items-center justify-center transition-all hover:scale-105 active:scale-95 ${rolling ? 'dice-roll' : ''}`}
                            >
                                {diceValue || "🎲"}
                            </button>
                        ) : (
                            <div className={`w-36 h-36 rounded-2xl border-4 border-gray-700 bg-gray-900 text-gray-500 font-extrabold text-5xl flex items-center justify-center ${rolling ? 'dice-roll' : ''}`}>
                                {diceValue || "🎲"}
                            </div>
                        )}
                    </div>

                    {room.status === 'PLAYING' && !isMyTurn && currentPlayer && (
                        <div className="text-yellow-400 animate-pulse">Turno di {currentPlayer.name}...</div>
                    )}

                    <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                             <div key={i} className={`flex flex-col items-center p-2 rounded glass-panel transition-all ${i === room.gameData.currentTurnIndex ? 'border border-pink-500 bg-white/5 scale-105' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                <img src={p.img} className="w-10 h-10 rounded-full object-cover" onError={(e) => e.target.src='https://placehold.co/40'}/>
                                <span className="text-xs font-bold truncate w-full mt-1 text-center">{p.name}</span>
                                {p.status !== 'ELIMINATED' && (
                                    <div className="w-full bg-gray-800 h-1.5 rounded mt-1 overflow-hidden">
                                        <div className="bg-red-500 h-full" style={{ width: `${(p.hp / (room.config?.initialHp || 50)) * 100}%` }}></div>
                                    </div>
                                )}
                                <span className="text-[10px] text-red-400 mt-1">{p.hp} HP</span>
                             </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Componente di gioco per la modalità Dadi Maledetti
        const CursedDiceGame = ({ room, user, updateRoom }) => {
            const [rolling, setRolling] = useState(false);
            const [diceValue, setDiceValue] = useState(null);
            
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer?.id === user.uid;
            const isHost = room.hostId === user.uid;

            const curseEffects = [
                { name: "Sacrificio (1)", desc: "Subisci 8 danni, infliggi 4 danni a tutti gli altri vivi!", color: "text-red-500" },
                { name: "Scudo Cyber (2)", desc: "Ottieni invulnerabilità protettiva per questo round!", color: "text-blue-400" },
                { name: "Cura (3)", desc: "Recupera 8 HP!", color: "text-green-400" },
                { name: "Spina di Rete (4)", desc: "Subisci 3 danni diretti!", color: "text-yellow-500" },
                { name: "Sifone di HP (5)", desc: "Ruba 5 HP a un avversario casuale!", color: "text-pink-400" },
                { name: "Scramble (6)", desc: "Tutti scambiano HP casualmente!", color: "text-purple-400" }
            ];

            const handleRoll = async () => {
                if (rolling) return;
                setRolling(true);
                playSynthSound('click');

                for (let i = 0; i < 8; i++) {
                    setDiceValue(Math.floor(Math.random() * 6) + 1);
                    await new Promise(r => setTimeout(r, 80));
                }

                const roll = Math.floor(Math.random() * 6) + 1;
                setDiceValue(roll);
                await new Promise(r => setTimeout(r, 600));

                let newPlayers = [...room.players];
                const me = newPlayers[room.gameData.currentTurnIndex];
                const maxHp = room.config?.initialHp || 50;
                let logMsg = "";

                if (roll === 1) { // Sacrificio
                    me.hp = Math.max(0, me.hp - 8);
                    newPlayers.forEach(p => {
                        if (p.id !== me.id && p.status !== 'ELIMINATED') {
                            p.hp = Math.max(0, p.hp - 4);
                        }
                    });
                    logMsg = `☠️ ${me.name} si è sacrificato! Sente 8 danni e infligge 4 danni a tutti!`;
                    playSynthSound('attack');
                } else if (roll === 2) { // Scudo
                    me.invulnerable = true;
                    logMsg = `🛡️ ${me.name} ottiene lo Scudo Cyber! Sarà immune per un turno!`;
                    playSynthSound('shield');
                } else if (roll === 3) { // Cura
                    me.hp = Math.min(maxHp, me.hp + 8);
                    logMsg = `💚 ${me.name} si cura di 8 HP!`;
                    playSynthSound('heal');
                } else if (roll === 4) { // Spina
                    me.hp = Math.max(0, me.hp - 3);
                    logMsg = `⚡ ${me.name} calpesta una spina di rete subendo 3 danni!`;
                    playSynthSound('sabotage');
                } else if (roll === 5) { // Sifone
                    const enemies = newPlayers.filter(p => p.id !== me.id && p.status !== 'ELIMINATED');
                    if (enemies.length > 0) {
                        const victim = enemies[Math.floor(Math.random() * enemies.length)];
                        const victimObj = newPlayers.find(p => p.id === victim.id);
                        victimObj.hp = Math.max(0, victimObj.hp - 5);
                        me.hp = Math.min(maxHp, me.hp + 5);
                        logMsg = `🩸 ${me.name} ruba 5 HP a ${victim.name}!`;
                        playSynthSound('attack');
                    } else {
                        logMsg = `🎲 ${me.name} prova a rubare, ma non ci sono nemici vivi!`;
                    }
                } else if (roll === 6) { // Scramble
                    const alive = newPlayers.filter(p => p.status !== 'ELIMINATED');
                    if (alive.length > 1) {
                        const hps = alive.map(p => p.hp);
                        for (let i = hps.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [hps[i], hps[j]] = [hps[j], hps[i]];
                        }
                        alive.forEach((p, idx) => {
                            p.hp = hps[idx];
                        });
                        logMsg = `🌀 CAOS! Tutti i valori HP dei superstiti sono stati scambiati!`;
                        playSynthSound('sabotage');
                    } else {
                        logMsg = `🎲 Caos cosmico inefficace su un unico superstite!`;
                    }
                }

                newPlayers.forEach(p => {
                    if (p.hp <= 0 && p.status !== 'ELIMINATED') {
                        p.hp = 0;
                        p.status = 'ELIMINATED';
                        p.eliminatedRound = room.gameData.round;
                        logMsg += ` \n💀 ${p.name} è stato scollegato!`;
                    }
                });

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;
                let nextIndex = room.gameData.currentTurnIndex;
                let nextRound = room.gameData.round || 1;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id || null;
                } else {
                    let loops = 0;
                    do {
                        nextIndex = (nextIndex + 1) % newPlayers.length;
                        if (newPlayers[nextIndex].invulnerable) {
                            newPlayers[nextIndex].invulnerable = false;
                        }
                        if (nextIndex === 0) nextRound++;
                        loops++;
                    } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                }

                setRolling(false);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    winnerId: winnerId,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: nextRound,
                        lastAction: logMsg
                    }
                });
            };

            useEffect(() => {
                if (currentPlayer?.isCpu && isHost && room.status === 'PLAYING' && !rolling) {
                    const timer = setTimeout(() => {
                        handleRoll();
                    }, 1500);
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl text-center">
                    <div className="text-2xl font-bold text-purple-500 flex items-center gap-2 uppercase tracking-wider">
                        <Dices /> Dadi Maledetti
                    </div>
                    <div className="glass-panel p-4 rounded text-center w-full min-h-[60px] flex flex-col items-center justify-center">
                        <div className="text-lg">{room.gameData.lastAction || "Il prossimo lancio potrebbe decidere il tuo destino."}</div>
                    </div>

                    <div className="flex flex-col sm:flex-row items-center gap-8 justify-center my-4">
                        <div className="relative w-36 h-36">
                            {isMyTurn && room.status === 'PLAYING' ? (
                                <button 
                                    onClick={handleRoll}
                                    disabled={rolling}
                                    className={`w-32 h-32 rounded-3xl border-4 bg-gradient-to-br from-purple-600 to-indigo-900 border-purple-500 text-white font-extrabold text-5xl flex items-center justify-center transition-all hover:scale-105 active:scale-95 ${rolling ? 'dice-roll' : ''}`}
                                >
                                    {diceValue || "🎲"}
                                </button>
                            ) : (
                                <div className={`w-32 h-32 rounded-3xl border-4 border-gray-700 bg-gray-900 text-gray-500 font-extrabold text-5xl flex items-center justify-center ${rolling ? 'dice-roll' : ''}`}>
                                    {diceValue || "🎲"}
                                </div>
                            )}
                        </div>

                        <div className="text-left bg-black/40 border border-white/10 p-4 rounded-xl text-xs max-w-xs space-y-1">
                            <div className="font-bold text-purple-400 border-b border-white/10 pb-1 mb-1 uppercase text-[10px]">Leggenda della Maledizione</div>
                            {curseEffects.map((eff, i) => (
                                <div key={i} className="flex gap-2">
                                    <span className={`${eff.color} font-bold w-20 shrink-0`}>{eff.name}:</span>
                                    <span className="text-gray-300">{eff.desc}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {room.status === 'PLAYING' && !isMyTurn && currentPlayer && (
                        <div className="text-yellow-400 animate-pulse">Turno di {currentPlayer.name}...</div>
                    )}

                    <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                             <div key={i} className={`flex flex-col items-center p-2 rounded glass-panel transition-all ${i === room.gameData.currentTurnIndex ? 'border border-purple-500 bg-white/5 scale-105' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                <img src={p.img} className="w-10 h-10 rounded-full object-cover" onError={(e) => e.target.src='https://placehold.co/40'}/>
                                <span className="text-xs font-bold truncate w-full mt-1 text-center">{p.name}</span>
                                {p.status !== 'ELIMINATED' && (
                                    <div className="w-full bg-gray-800 h-1.5 rounded mt-1 overflow-hidden">
                                        <div className="bg-red-500 h-full" style={{ width: `${(p.hp / (room.config?.initialHp || 50)) * 100}%` }}></div>
                                    </div>
                                )}
                                <span className="text-[10px] text-purple-300 mt-1">{p.hp} HP {p.invulnerable ? "🛡️" : ""}</span>
                             </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CyberDeckGame = ({ room, user, updateRoom }) => {
            const [selectedCardId, setSelectedCardId] = useState(null);
            const [selectedTargetId, setSelectedTargetId] = useState(null);
            const [localSubmitted, setLocalSubmitted] = useState(false);

            const isHost = room.hostId === user.uid;
            const alivePlayers = room.players.filter(p => p.status !== 'ELIMINATED');
            const myPlayer = room.players.find(p => p.id === user.uid);
            const isAlive = myPlayer && myPlayer.status !== 'ELIMINATED';

            const secretActions = room.gameData.secretActions || {};
            const revealIndex = room.gameData.revealIndex !== undefined ? room.gameData.revealIndex : -1;
            const orderedActions = room.gameData.orderedActions || [];
            
            // Trova la carta selezionata localmente
            const currentSelectedCard = CYBER_CARDS.find(c => c.id === selectedCardId);

            // Audio trigger on dynamic updates
            useEffect(() => {
                if (revealIndex >= 0 && orderedActions[revealIndex]) {
                    const act = orderedActions[revealIndex];
                    const card = CYBER_CARDS.find(c => c.id === act.cardId);
                    if (card) {
                        if (["BUFF", "BUFF_SELECT"].includes(card.type)) playSynthSound('shield');
                        else if (["HEAL"].includes(card.type)) playSynthSound('heal');
                        else if (["SABOTAGE"].includes(card.type)) playSynthSound('sabotage');
                        else playSynthSound('attack');
                    }
                }
            }, [revealIndex]);

            // CPU auto selection managed by host
            useEffect(() => {
                if (isHost && room.status === 'PLAYING' && revealIndex === -1) {
                    const cpusToSubmit = room.players.filter(p => p.isCpu && p.status !== 'ELIMINATED' && !secretActions[p.id]);
                    if (cpusToSubmit.length > 0) {
                        const timeout = setTimeout(async () => {
                            let updatedSecret = { ...secretActions };
                            cpusToSubmit.forEach(cpu => {
                                const cpuHand = cpu.hand || [];
                                if (cpuHand.length > 0) {
                                    const randomCardId = cpuHand[Math.floor(Math.random() * cpuHand.length)];
                                    const card = CYBER_CARDS.find(c => c.id === randomCardId);
                                    
                                    // Scegli bersaglio tra altri giocatori vivi
                                    const enemies = room.players.filter(p => p.id !== cpu.id && p.status !== 'ELIMINATED');
                                    let targetId = "";
                                    if (enemies.length > 0) {
                                        targetId = enemies[Math.floor(Math.random() * enemies.length)].id;
                                    }
                                    updatedSecret[cpu.id] = { cardId: randomCardId, targetId: targetId };
                                }
                            });
                            await updateRoom({ "gameData.secretActions": updatedSecret });
                        }, 1200);
                        return () => clearTimeout(timeout);
                    }
                }
            }, [isHost, secretActions, revealIndex, room.status]);

            // Reset local submission state when starting a new round
            useEffect(() => {
                if (revealIndex === -1 && !secretActions[user.uid]) {
                    setLocalSubmitted(false);
                    setSelectedCardId(null);
                    setSelectedTargetId(null);
                }
            }, [revealIndex, secretActions]);

            const handleCardClick = (card) => {
                if (!isAlive || localSubmitted || revealIndex >= 0) return;
                playSynthSound('click');
                setSelectedCardId(card.id);
                setSelectedTargetId(null);

                // Se la mossa non necessita di bersaglio, possiamo impostarla a vuota
                if (["BUFF", "HEAL", "RNG_ALL", "ATTACK_ALL"].includes(card.type)) {
                    setSelectedTargetId("");
                }
            };

            const handleTargetSelect = (targetPlayer) => {
                if (!selectedCardId || localSubmitted || revealIndex >= 0) return;
                playSynthSound('click');
                setSelectedTargetId(targetPlayer.id);
            };

            const confirmAction = async () => {
                if (!selectedCardId || selectedTargetId === null) return;
                setLocalSubmitted(true);
                
                const updatedSecret = {
                    ...secretActions,
                    [user.uid]: { cardId: selectedCardId, targetId: selectedTargetId }
                };

                await updateRoom({ "gameData.secretActions": updatedSecret });
            };

            const resolveAllActionsAndStartReveal = async () => {
                if (!isHost) return;

                let simulatedPlayers = JSON.parse(JSON.stringify(room.players));
                const currentRound = room.gameData.round || 1;
                
                // Mappa i pacchetti azione secretati
                let rawActions = Object.keys(secretActions).map(playerId => {
                    const p = simulatedPlayers.find(pl => pl.id === playerId);
                    return {
                        playerId,
                        playerName: p ? p.name : "Giocatore",
                        playerImg: p ? p.img : "",
                        cardId: secretActions[playerId].cardId,
                        targetId: secretActions[playerId].targetId
                    };
                });

                // Ordine strategico di priorità (Scudi prima, poi cure, sabotaggi e per finire attacchi e RNG)
                const getPriority = (cardId) => {
                    const card = CYBER_CARDS.find(c => c.id === cardId);
                    if (!card) return 4;
                    if (["BUFF", "BUFF_SELECT"].includes(card.type)) return 1;
                    if (["HEAL"].includes(card.type)) return 2;
                    if (["SABOTAGE"].includes(card.type)) return 3;
                    return 4; // Attacchi e Caos
                };

                rawActions.sort((a, b) => getPriority(a.cardId) - getPriority(b.cardId));

                let actionTimeline = [];
                let resolvedLogAccumulator = "";

                // Esegui la simulazione per creare la timeline decisa dell'Host
                rawActions.forEach((act) => {
                    const attacker = simulatedPlayers.find(p => p.id === act.playerId);
                    if (!attacker || attacker.status === 'ELIMINATED') return; // Giocatore morto prima della mossa

                    const card = CYBER_CARDS.find(c => c.id === act.cardId);
                    if (!card) return;

                    let logMsg = `${attacker.name} lancia [${card.name}]`;
                    let targetPlayer = simulatedPlayers.find(p => p.id === act.targetId);

                    if (targetPlayer) {
                        logMsg += ` su ${targetPlayer.name}. `;
                    } else {
                        logMsg += `. `;
                    }

                    // Controlla se l'attaccante soffre per Rete di Spine attiva
                    if (attacker.spineRounds > 0) {
                        attacker.hp = Math.max(0, attacker.hp - 2);
                        attacker.spineRounds--;
                        logMsg += `(Rete di Spine punisce ${attacker.name} con -2 HP! Rimangono ${attacker.spineRounds} round) `;
                    }

                    const dealDamage = (target, amount, incontestable = false) => {
                        if (target.invulnerable && !incontestable) {
                            logMsg += `[BLOCCATO!] Lo scudo di ${target.name} assorbe interamente il colpo! `;
                            return 0;
                        }
                        if (target.reflected && !incontestable) {
                            attacker.hp = Math.max(0, attacker.hp - amount);
                            target.reflected = false;
                            logMsg += `[RIFLESSO!] Lo Scudo a Specchio di ${target.name} devia il danno interamente su ${attacker.name}! `;
                            return 0;
                        }
                        target.hp = Math.max(0, target.hp - amount);
                        attacker.score = (attacker.score || 0) + amount;
                        logMsg += `Infligge ${amount} danni a ${target.name}. `;
                        return amount;
                    };

                    const heal = (target, amount) => {
                        const max = room.config?.initialHp || 50;
                        const oldHp = target.hp;
                        target.hp = Math.min(max, target.hp + amount);
                        logMsg += `Recupera +${target.hp - oldHp} HP. `;
                    };

                    // Implementazione degli effetti delle 24 carte elette
                    switch (card.id) {
                        case 1: // Plasma Laser
                            if (targetPlayer) dealDamage(targetPlayer, 6);
                            break;
                        case 2: // Sanguisuga Digitale
                            if (targetPlayer) {
                                const actualDmg = dealDamage(targetPlayer, 4);
                                if (actualDmg > 0) heal(attacker, 4);
                            }
                            break;
                        case 3: // Colpo Critico 404
                            if (targetPlayer) {
                                if (Math.random() > 0.5) {
                                    dealDamage(targetPlayer, 10);
                                } else {
                                    logMsg += "FALLITO! Il software crasha, nessun danno inflitto.";
                                }
                            }
                            break;
                        case 4: // Cannone a Risonanza
                            if (targetPlayer) {
                                dealDamage(targetPlayer, 5);
                                const aliveIndices = simulatedPlayers.map((p, idx) => p.status !== 'ELIMINATED' ? idx : null).filter(idx => idx !== null);
                                const currentTargetPos = simulatedPlayers.findIndex(p => p.id === targetPlayer.id);
                                const alivePos = aliveIndices.indexOf(currentTargetPos);
                                
                                const prevIndex = aliveIndices[(alivePos - 1 + aliveIndices.length) % aliveIndices.length];
                                const nextIndex = aliveIndices[(alivePos + 1) % aliveIndices.length];

                                if (prevIndex !== undefined && simulatedPlayers[prevIndex].id !== attacker.id) {
                                    dealDamage(simulatedPlayers[prevIndex], 2);
                                }
                                if (nextIndex !== undefined && simulatedPlayers[nextIndex].id !== attacker.id && nextIndex !== prevIndex) {
                                    dealDamage(simulatedPlayers[nextIndex], 2);
                                }
                            }
                            break;
                        case 5: // Overclock Offensivo
                            if (targetPlayer) {
                                attacker.hp = Math.max(0, attacker.hp - 3);
                                logMsg += `Sacrifica 3 HP. `;
                                dealDamage(targetPlayer, 8);
                            }
                            break;
                        case 6: // Algoritmo Mietitore
                            if (targetPlayer) {
                                const handSize = targetPlayer.hand ? targetPlayer.hand.length : 3;
                                dealDamage(targetPlayer, handSize * 2);
                            }
                            break;
                        case 7: // Sisma Elettronico
                            simulatedPlayers.forEach(p => {
                                if (p.status !== 'ELIMINATED') {
                                    p.hp = Math.max(0, p.hp - 1);
                                    if (p.hand && p.hand.length > 0) {
                                        p.hand.splice(Math.floor(Math.random() * p.hand.length), 1);
                                        p.hand.push(Math.ceil(Math.random() * 24));
                                    }
                                }
                            });
                            logMsg += "Terremoto elettrico totale! Tutti subiscono 1 danno e rimescolano 1 carta.";
                            break;
                        case 8: // Rete di Spine
                            if (targetPlayer) {
                                dealDamage(targetPlayer, 2);
                                targetPlayer.spineRounds = (targetPlayer.spineRounds || 0) + 2;
                                logMsg += `Applica Malus Spine per 2 turni. `;
                            }
                            break;
                        case 9: // Pugno in Faccia
                            if (targetPlayer) dealDamage(targetPlayer, 3, true); // Ignora scudi passivi e specchi!
                            break;
                        case 10: // Sciame di Vespe
                            const targetsAlive = simulatedPlayers.filter(p => p.status !== 'ELIMINATED');
                            const chosen = [];
                            for (let i = 0; i < 3; i++) {
                                if (targetsAlive.length > 0) {
                                    const pickIdx = Math.floor(Math.random() * targetsAlive.length);
                                    dealDamage(targetsAlive[pickIdx], 2);
                                    chosen.push(targetsAlive[pickIdx].name);
                                    targetsAlive.splice(pickIdx, 1);
                                }
                            }
                            logMsg += `Sciame colpisce casualmente: ${chosen.join(', ')}.`;
                            break;
                        case 11: // Calcio
                            if (targetPlayer) {
                                targetPlayer.invulnerable = false;
                                targetPlayer.reflected = false;
                                logMsg += `Frantuma ogni barriera protettiva di ${targetPlayer.name}! `;
                                dealDamage(targetPlayer, 3);
                            }
                            break;
                        case 12: // Firewall Laser
                            attacker.invulnerable = true;
                            break;
                        case 13: // Scudo a Specchio
                            attacker.reflected = true;
                            break;
                        case 14: // Nano-Iniezione
                            heal(attacker, 8);
                            break;
                        case 15: // Patch di Sicurezza
                            heal(attacker, 5);
                            attacker.spineRounds = 0;
                            attacker.skipNextTurn = false;
                            logMsg += "Rimuove ogni stato alterato negativo.";
                            break;
                        case 16: // Barriera Condivisa
                            attacker.invulnerable = true;
                            if (targetPlayer) targetPlayer.invulnerable = true;
                            break;
                        case 17: // Rigeneratore di Celle
                            attacker.regenTurns = (attacker.regenTurns || 0) + 4;
                            logMsg += `Avvia rigenerazione nanotecnologica. `;
                            break;
                        case 18: // DDoS Attack
                            if (targetPlayer) {
                                targetPlayer.skipNextTurn = true;
                                logMsg += `Bloccherà il prossimo turno di ${targetPlayer.name}. `;
                            }
                            break;
                        case 19: // Riavvio Forzato
                            if (targetPlayer) {
                                targetPlayer.hand = [Math.ceil(Math.random()*24), Math.ceil(Math.random()*24), Math.ceil(Math.random()*24)];
                                logMsg += `Svuota e riavvia l'interfaccia di ${targetPlayer.name}. `;
                            }
                            break;
                        case 20: // Keylogger
                            if (targetPlayer) {
                                targetPlayer.keyloggedBy = attacker.id;
                                targetPlayer.keylogTimer = 2;
                                logMsg += `Inietta spia digitale per 2 round. `;
                            }
                            break;
                        case 21: // Roulette Russa
                            if (targetPlayer) {
                                if (Math.random() > 0.5) {
                                    dealDamage(targetPlayer, 10);
                                    logMsg += "Il colpo colpisce il bersaglio.";
                                } else {
                                    attacker.hp = Math.max(0, attacker.hp - 5);
                                    logMsg += "Sfortuna! Il colpo esplode all'indietro (-5 HP).";
                                }
                            }
                            break;
                        case 22: // Tempesta EMP
                            logMsg += "La tempesta disattiva le interfacce olografiche per il round corrente.";
                            break;
                        case 23: // Ira dei Pincher
                            const aliveForPincher = simulatedPlayers.filter(p => p.status !== 'ELIMINATED');
                            const effects = [
                                () => { const p = aliveForPincher[Math.floor(Math.random() * aliveForPincher.length)]; dealDamage(p, 5); logMsg += `[Artiglio] 5 danni a ${p.name}. `; },
                                () => { const p = aliveForPincher[Math.floor(Math.random() * aliveForPincher.length)]; if(p.hand) p.hand.splice(Math.floor(Math.random() * p.hand.length), 1); p.hand.push(Math.ceil(Math.random()*24)); logMsg += `[Morso] scarto di carta a ${p.name}. `; },
                                () => { const p = aliveForPincher[Math.floor(Math.random() * aliveForPincher.length)]; heal(p, 3); logMsg += `[Cura] +3 HP a ${p.name}. `; },
                                () => { const p = aliveForPincher[Math.floor(Math.random() * aliveForPincher.length)]; dealDamage(p, 3); logMsg += `[Ringhio] 3 danni a ${p.name}. `; }
                            ];
                            effects.forEach(f => f());
                            break;
                        case 24: // Specchio del Destino
                            const sortedAlive = [...simulatedPlayers].filter(p => p.status !== 'ELIMINATED').sort((a,b) => b.hp - a.hp);
                            if (sortedAlive.length >= 2) {
                                const richest = simulatedPlayers.find(p => p.id === sortedAlive[0].id);
                                const poorest = simulatedPlayers.find(p => p.id === sortedAlive[sortedAlive.length-1].id);
                                const temp = richest.hp;
                                richest.hp = poorest.hp;
                                poorest.hp = temp;
                                logMsg += `HP scambiati tra ${richest.name} e ${poorest.name}!`;
                            }
                            break;
                    }

                    // Gestione decesso
                    simulatedPlayers.forEach(p => {
                        if (p.hp <= 0 && p.status !== 'ELIMINATED') {
                            p.hp = 0;
                            p.status = 'ELIMINATED';
                            p.eliminatedRound = currentRound;
                            logMsg += `\n💀 ${p.name} è stato SCOLLEGATO!`;
                        }
                    });

                    // Registra l'azione e la salute di tutti i giocatori in questo istante della timeline
                    actionTimeline.push({
                        playerId: act.playerId,
                        playerName: act.playerName,
                        playerImg: act.playerImg,
                        cardId: act.cardId,
                        targetId: act.targetId,
                        resolvedText: logMsg,
                        stateSnapshot: JSON.parse(JSON.stringify(simulatedPlayers))
                    });

                    resolvedLogAccumulator += logMsg + "\n";
                });

                // Rimuovi le carte usate dalle mani dei giocatori e pescane di nuove solo se esaurite del tutto
                simulatedPlayers.forEach(p => {
                    if (p.status !== 'ELIMINATED') {
                        const originalPlayer = room.players.find(op => op.id === p.id);
                        const usedCardId = secretActions[p.id]?.cardId;
                        
                        if (usedCardId && originalPlayer) {
                            p.hand = (originalPlayer.hand || []).filter(id => id !== usedCardId);
                            // Ricarica la mano a 3 carte solo ed esclusivamente se è vuota!
                            if (p.hand.length === 0) {
                                while (p.hand.length < 3) {
                                    p.hand.push(Math.ceil(Math.random() * 24));
                                }
                            }
                        }
                    }
                });

                // Salva lo stato elaborato e avvia la proiezione sequenziale
                await updateRoom({
                    "gameData.orderedActions": actionTimeline,
                    "gameData.revealIndex": 0,
                    "gameData.simulatedPlayersState": simulatedPlayers
                });
            };

            const nextReveal = async () => {
                if (!isHost) return;
                const nextIdx = revealIndex + 1;
                
                if (nextIdx < orderedActions.length) {
                    await updateRoom({ "gameData.revealIndex": nextIdx });
                } else {
                    // Tutti i reveal sono terminati, concludiamo il turno
                    let finalPlayers = [...room.gameData.simulatedPlayersState];
                    let currentRound = room.gameData.round || 1;
                    
                    // Gestione scadenze scudi e rigenerazioni per il round successivo
                    finalPlayers.forEach(p => {
                        if (p.status !== 'ELIMINATED') {
                            if (p.invulnerable) p.invulnerable = false;
                            if (p.reflected) p.reflected = false;
                            
                            if (p.keylogTimer > 0) {
                                p.keylogTimer--;
                                if (p.keylogTimer === 0) p.keyloggedBy = null;
                            }

                            if (p.regenTurns > 0) {
                                const max = room.config?.initialHp || 50;
                                p.hp = Math.min(max, p.hp + 2);
                                p.regenTurns--;
                            }
                        }
                    });

                    const survivors = finalPlayers.filter(p => p.status !== 'ELIMINATED');
                    let nextStatus = 'PLAYING';
                    let winnerId = null;
                    let nextRound = currentRound + 1;

                    if (survivors.length <= 1) {
                        nextStatus = 'GAME_OVER';
                        winnerId = survivors[0]?.id || null;
                    }

                    // Reset per il prossimo round
                    await updateRoom({
                        players: finalPlayers,
                        status: nextStatus,
                        winnerId: winnerId,
                        "gameData.revealIndex": -1,
                        "gameData.secretActions": {},
                        "gameData.orderedActions": [],
                        "gameData.round": nextRound,
                        "gameData.lastAction": `Il Round ${currentRound} si è concluso con successo. Caricamento prossimo round olografico.`
                    });
                }
            };

            const currentRevealAction = orderedActions[revealIndex];
            const allSubmitted = Object.keys(secretActions).length === alivePlayers.length;

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-4xl font-mono">
                    {/* TITOLO PRINCIPALE */}
                    <div className="text-2xl md:text-3xl font-bold text-center text-cyan-400 flex items-center gap-2 uppercase tracking-widest animate-pulse">
                        <BookOpen size={32} /> Mazzo Cybernetico (Pianificazione Simultanea)
                    </div>

                    {/* SCHERMATA DI RIVELAZIONE SEQUENZIALE (MODO SUSPANCE ATTIVO) */}
                    {revealIndex >= 0 ? (
                        <div className="w-full bg-[#0a0a16] border-2 border-cyan-500 rounded-2xl p-6 shadow-[0_0_35px_rgba(6,182,212,0.4)] relative overflow-hidden scanlines flex flex-col items-center">
                            <div className="absolute top-2 right-4 text-xs text-cyan-500 font-bold tracking-widest animate-pulse">
                                RIVELAZIONE IN CORSO: {revealIndex + 1} / {orderedActions.length}
                            </div>
                            
                            <h3 className="text-xl font-bold text-cyan-400 mb-6 uppercase tracking-wider">
                                📡 Decrittografia Segnale Net_
                            </h3>

                            {/* Pannello d'azione olografico cinematografico */}
                            {currentRevealAction && (
                                <div className="flex flex-col items-center text-center w-full max-w-2xl bg-white/5 p-6 rounded-xl border border-cyan-500/30 animate-rise">
                                    <div className="flex items-center gap-4 mb-4">
                                        <img 
                                            src={currentRevealAction.playerImg} 
                                            className="w-16 h-16 rounded-full border-2 border-cyan-500 object-cover shadow-[0_0_15px_rgba(6,182,212,0.6)]" 
                                            onError={(e) => e.target.src='https://placehold.co/64'}
                                        />
                                        <div className="text-left">
                                            <div className="text-xs text-cyan-400 uppercase tracking-widest font-bold">Giocatore</div>
                                            <div className="text-2xl font-black text-white">{currentRevealAction.playerName}</div>
                                        </div>
                                    </div>

                                    {/* Dettagli della carta giocata */}
                                    <div className="bg-cyan-950/40 p-4 rounded-xl border border-cyan-500/20 w-full mb-6 max-w-lg">
                                        <div className="text-3xl mb-1">
                                            {CYBER_CARDS.find(c => c.id === currentRevealAction.cardId)?.icon || "🃏"}
                                        </div>
                                        <div className="text-xl font-black text-cyan-300 uppercase">
                                            {CYBER_CARDS.find(c => c.id === currentRevealAction.cardId)?.name || "Software"}
                                        </div>
                                        <div className="text-xs text-gray-400 mt-1 italic">
                                            {CYBER_CARDS.find(c => c.id === currentRevealAction.cardId)?.desc || ""}
                                        </div>
                                    </div>

                                    {/* Risoluzione testuale in tempo reale */}
                                    <div className="text-lg text-white font-mono leading-relaxed bg-black/60 p-4 rounded border border-white/5 w-full text-left whitespace-pre-line min-h-[80px]">
                                        {currentRevealAction.resolvedText}
                                    </div>
                                </div>
                            )}

                            {/* Visualizzatore HP del snapshot corrente */}
                            <div className="w-full mt-6 grid grid-cols-2 sm:grid-cols-4 gap-3">
                                {currentRevealAction?.stateSnapshot?.map((p, idx) => (
                                    <div key={idx} className={`p-2 rounded-lg glass-panel text-center transition-all ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                        <div className="text-xs font-bold truncate">{p.name}</div>
                                        <div className="w-full bg-gray-800 h-2.5 rounded-full overflow-hidden mt-1">
                                            <div 
                                                className="bg-red-500 h-full transition-all duration-500" 
                                                style={{ width: `${Math.min(100, (p.hp / (room.config?.initialHp || 50)) * 100)}%` }}
                                            />
                                        </div>
                                        <div className="text-[10px] text-gray-400 mt-1">HP: {p.hp}</div>
                                    </div>
                                ))}
                            </div>

                            {/* CONTROLLI DEL REVEAL (SOLO PER L'HOST) */}
                            {isHost && (
                                <button 
                                    onClick={nextReveal}
                                    className="mt-8 bg-green-600 hover:bg-green-500 text-white font-bold px-10 py-4 rounded-xl text-lg transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(34,197,94,0.4)] flex items-center gap-2"
                                >
                                    {revealIndex + 1 < orderedActions.length ? "ANALIZZA PROSSIMA AZIONE 📡" : "COMPLETA TURNO E APPLICA STATI ⚡"}
                                </button>
                            )}
                            {!isHost && (
                                <div className="mt-8 text-cyan-400 text-sm animate-pulse uppercase tracking-widest font-bold">
                                    Scansione del mainframe dell'Host in corso...
                                </div>
                            )}
                        </div>
                    ) : (
                        /* SCHERMATA DI PIANIFICAZIONE DELLE MOSSE */
                        <div className="w-full flex flex-col items-center gap-6">
                            {/* Pannello di stato delle prenotazioni degli altri giocatori */}
                            <div className="w-full glass-panel p-4 rounded-xl border border-cyan-500/30">
                                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 text-center">
                                    Stato Collegamenti Network
                                </h3>
                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                    {room.players.map((p, i) => {
                                        const submitted = !!secretActions[p.id];
                                        const isCurr = p.id === user.uid;
                                        return (
                                            <div 
                                                key={i} 
                                                onClick={() => !localSubmitted && selectedCardId && p.status !== 'ELIMINATED' && handleTargetSelect(p)}
                                                className={`p-3 rounded-lg flex flex-col items-center border transition-all relative
                                                    ${isCurr ? 'bg-cyan-500/10 border-cyan-500' : 'bg-black/30 border-white/5'}
                                                    ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}
                                                    ${selectedTargetId === p.id ? 'ring-2 ring-red-500 scale-105' : ''}
                                                    ${!localSubmitted && selectedCardId && p.id !== user.uid && p.status !== 'ELIMINATED' ? 'cursor-pointer hover:border-red-500 hover:scale-105 animate-pulse' : ''}
                                                `}
                                            >
                                                <img src={p.img} className="w-10 h-10 rounded-full mb-2 object-cover" onError={(e) => e.target.src='https://placehold.co/40'}/>
                                                <span className="text-[10px] font-bold truncate w-full text-center">{p.name}</span>
                                                
                                                {/* Badge di stato caricamento software */}
                                                {p.status !== 'ELIMINATED' && (
                                                    <span className={`text-[9px] px-1.5 py-0.5 rounded mt-1.5 uppercase font-bold tracking-wider ${submitted ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 animate-pulse'}`}>
                                                        {submitted ? "Software Ready 🔒" : "Hacking..."}
                                                    </span>
                                                )}
                                                {p.status === 'ELIMINATED' && (
                                                    <span className="text-[9px] text-red-500 font-bold uppercase mt-1">Scollegato</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* MANO DEL GIOCATORE (SE ANCORA VIVO) */}
                            {isAlive ? (
                                <div className="w-full mt-4 flex flex-col items-center">
                                    <h3 className="text-lg font-bold mb-3 text-cyan-400 uppercase tracking-widest text-center">
                                        {localSubmitted ? "Software caricato con successo!" : "Seleziona un Programma Neon e un Bersaglio:"}
                                    </h3>

                                    {!localSubmitted ? (
                                        <div className="w-full flex flex-col items-center gap-6">
                                            {/* Griglia flessibile di carte in mano (centrate dinamicamente) */}
                                            <div className="flex flex-wrap justify-center gap-4 max-w-2xl w-full">
                                                {(myPlayer.hand || []).slice(0, 3).map((cardId, index) => {
                                                    const card = CYBER_CARDS.find(c => c.id === cardId);
                                                    if (!card) return null;
                                                    const isSelected = selectedCardId === card.id;

                                                    return (
                                                        <div 
                                                            key={index} 
                                                            onClick={() => handleCardClick(card)}
                                                            className={`cyber-card flex flex-col p-4 rounded-xl border-2 text-center select-none min-h-[160px] w-48 justify-between relative transition-all duration-300
                                                                ${card.color}
                                                                ${isSelected ? 'ring-4 ring-cyan-400 scale-105 shadow-[0_0_20px_rgba(6,182,212,0.6)]' : ''}
                                                            `}
                                                        >
                                                            <div className="text-3xl">{card.icon}</div>
                                                            <div className="font-bold text-sm tracking-wide mt-1 uppercase">
                                                                {card.name}
                                                            </div>
                                                            <div className="text-[10px] opacity-80 mt-2 leading-tight">
                                                                {card.desc}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* Bottone di conferma azione */}
                                            {selectedCardId && (
                                                <div className="flex flex-col items-center gap-2 animate-rise">
                                                    <div className="text-sm text-yellow-400 font-bold uppercase">
                                                        {selectedTargetId === "" ? "Pronto all'uso autonomo!" : selectedTargetId ? "Bersaglio agganciato!" : "Seleziona un bersaglio cliccando sulla sua scheda in alto!"}
                                                    </div>
                                                    <button 
                                                        onClick={confirmAction}
                                                        disabled={selectedTargetId === null}
                                                        className={`px-8 py-3 rounded-xl font-bold text-lg uppercase transition-all transform hover:scale-105
                                                            ${selectedTargetId !== null ? 'bg-cyan-500 hover:bg-cyan-400 text-black shadow-[0_0_20px_rgba(6,182,212,0.5)]' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}
                                                        `}
                                                    >
                                                        Carica software nel server 📤
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="p-8 glass-panel border border-green-500/30 rounded-xl text-center flex flex-col items-center max-w-md">
                                            <span className="text-4xl animate-bounce mb-2">💾</span>
                                            <div className="text-green-400 font-bold uppercase tracking-widest text-lg">Programma in attesa di decrittografia</div>
                                            <div className="text-xs text-gray-400 mt-2 font-serif">
                                                Il tuo attacco [{CYBER_CARDS.find(c => c.id === selectedCardId)?.name}] è pronto. Attendi che tutti carichino le proprie mosse sul server centrale per dare il via alla proiezione olografica!
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center py-6 text-red-500 animate-pulse uppercase tracking-widest font-bold">
                                    💀 Sei stato disconnesso dal mainframe! Puoi solo assistere allo scontro.
                                </div>
                            )}

                            {/* CONTROLLER ATTIVAZIONE REVEAL GENERALE (HOST ONLY) */}
                            {isHost && (
                                <div className="mt-8 border-t border-white/10 pt-6 w-full flex flex-col items-center">
                                    {allSubmitted ? (
                                        <button 
                                            onClick={resolveAllActionsAndStartReveal}
                                            className="bg-purple-600 hover:bg-purple-500 text-white font-bold px-10 py-5 rounded-2xl text-xl transition-all transform hover:scale-110 shadow-[0_0_30px_rgba(147,51,234,0.6)] animate-bounce"
                                        >
                                            📡 AVVIA SCANSIONE OLOGRAFICA DEL ROUND! 📡
                                        </button>
                                    ) : (
                                        <div className="text-gray-400 text-sm animate-pulse italic">
                                            In attesa che tutti i nodi si colleghino per sbloccare la proiezione...
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const DetonatorGame = ({ room, user, updateRoom }) => {
            const [pressing, setPressing] = useState(false);
            const [explosion, setExplosion] = useState(false);
            
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            const handleTrigger = async () => {
                if (pressing) return;
                setPressing(true);
                setExplosion(false);

                await new Promise(r => setTimeout(r, 1200));

                const currentRisk = room.gameData.risk || 10;
                const roll = Math.random() * 100;
                
                let newPlayers = [...room.players];
                const me = newPlayers[room.gameData.currentTurnIndex];
                let logMsg = "";
                let nextRisk = currentRisk;

                if (roll < currentRisk) {
                    setExplosion(true);
                    me.status = 'ELIMINATED';
                    me.eliminatedRound = room.gameData.round;
                    logMsg = `BOOM! ${me.name} è saltato in aria! (Rischio era ${currentRisk}%)`;
                    nextRisk = 10;
                    
                    await new Promise(r => setTimeout(r, 1000));
                } else {
                    me.score = (me.score || 0) + 50 + currentRisk;
                    logMsg = `CLICK! ${me.name} è salvo. (+${50+currentRisk} PT)`;
                    nextRisk = Math.min(95, currentRisk + 15);
                }

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;
                let nextIndex = room.gameData.currentTurnIndex;
                let nextRound = room.gameData.round || 1;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id;
                    logMsg += ` ${survivors[0]?.name} VINCE!`;
                } else {
                    let loops = 0;
                    do {
                        nextIndex = (nextIndex + 1) % newPlayers.length;
                        if(nextIndex === 0) nextRound++;
                        loops++;
                    } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                }

                setPressing(false);
                setExplosion(false);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    winnerId: winnerId,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: nextRound,
                        risk: nextRisk,
                        lastAction: logMsg
                    }
                });
            };

            useEffect(() => {
                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING') {
                    const timer = setTimeout(() => {
                        handleTrigger();
                    }, 1500);
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            const riskLevel = room.gameData.risk || 10;
            const riskColor = riskLevel < 30 ? 'text-green-500' : riskLevel < 60 ? 'text-yellow-500' : 'text-red-500 animate-pulse';

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl">
                    <div className="text-2xl font-bold text-center text-red-500 flex items-center gap-2"><Power /> Il Detonatore</div>

                    <div className="glass-panel p-4 rounded-xl text-center w-full min-h-[80px] flex flex-col items-center justify-center">
                        <div className="text-lg">{room.gameData.lastAction || "Tocca a te... spera bene."}</div>
                    </div>

                    <div className="relative w-64 h-64 flex items-center justify-center">
                        <div className={`absolute inset-0 rounded-full transition-all duration-1000 opacity-20 ${riskLevel > 50 ? 'bg-red-500 animate-ping' : 'bg-transparent'}`} style={{ animationDuration: `${Math.max(0.2, 1 - riskLevel/100)}s` }}></div>

                        {isMyTurn && room.status === 'PLAYING' ? (
                            <button 
                                onClick={handleTrigger}
                                disabled={pressing}
                                className={`w-48 h-48 rounded-full border-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all transform active:scale-95 flex flex-col items-center justify-center z-10
                                    ${pressing ? 'bg-gray-800 border-gray-600' : 'bg-gradient-to-br from-red-600 to-red-900 border-red-500 hover:scale-105'}
                                    ${explosion ? 'animate-bounce bg-white' : ''}
