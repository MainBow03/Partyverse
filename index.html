                                `}
                            >
                                {pressing ? (
                                    <span className="text-2xl font-mono animate-pulse">...</span>
                                ) : (
                                    <>
                                        <Power size={64} className="text-white mb-2" />
                                        <span className="text-xl font-bold text-white">PREMI</span>
                                    </>
                                )}
                            </button>
                        ) : (
                            <div className="w-48 h-48 rounded-full border-8 border-gray-700 bg-gray-900 flex flex-col items-center justify-center opacity-70">
                                <div className="text-gray-500 font-bold">ATTENDI</div>
                            </div>
                        )}
                    </div>

                    <div className="flex flex-col items-center">
                        <div className="text-sm uppercase tracking-widest text-gray-400">Probabilità Esplosione</div>
                        <div className={`text-5xl font-mono font-bold ${riskColor}`}>{riskLevel}%</div>
                    </div>

                    <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                             <div key={i} className={`flex flex-col items-center p-2 rounded glass-panel transition-all ${i === room.gameData.currentTurnIndex ? 'border border-yellow-500 bg-white/5' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                {}
                                <img src={p.img} className="w-10 h-10 rounded-full border border-white/20" onError={(e) => e.target.src='https://placehold.co/40'}/>
                                <span className="text-xs font-bold truncate w-full mt-1 text-center">{p.name}</span>
                                {p.status !== 'ELIMINATED' && <span className="text-[10px] text-blue-400">{p.score} PT</span>}
                                {p.status === 'ELIMINATED' && <Skull size={12} className="text-red-500 mt-1"/>}
                             </div>
                        ))}
                    </div>
                    
                    {room.status === 'PLAYING' && !isMyTurn && (
                         <div className="text-yellow-400 animate-pulse mt-4">Tocca a {currentPlayer.name}...</div>
                    )}
                </div>
            );
        };

        const ClickRaceGame = ({ room, user, updateRoom }) => {
            const [localScore, setLocalScore] = useState(0);
            
            useEffect(() => {
                if (room.hostId === user.uid && room.status === 'PLAYING' && room.gameData.raceStatus === 'GO') {
                    const interval = setInterval(() => {
                        const newPlayers = room.players.map(p => {
                            if (p.isCpu) {
                                return { ...p, score: (p.score || 0) + Math.floor(Math.random() * 5) + 1 };
                            }
                            return p;
                        });

                        updateRoom({
                            players: newPlayers,
                            gameData: { ...room.gameData, timeLeft: Math.max(0, (room.gameData.timeLeft || 10) - 1) }
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [room.status, room.gameData.raceStatus, room.gameData.timeLeft, room.players]);

            useEffect(() => {
                if (room.gameData.timeLeft === 0 && room.gameData.raceStatus === 'GO') {
                    if (room.hostId === user.uid) {
                        endGame();
                    }
                }
            }, [room.gameData.timeLeft]);

            const startGame = async () => {
                setLocalScore(0);
                await updateRoom({
                    gameData: { raceStatus: 'GO', timeLeft: 10 }
                });
            };

            const handleClick = () => {
                if (room.gameData.raceStatus === 'GO') {
                    setLocalScore(prev => prev + 1);
                }
            };

            const endGame = async () => {
                await updateRoom({
                    gameData: { ...room.gameData, raceStatus: 'CALCULATING', timeLeft: 0 }
                });
            };

            useEffect(() => {
                if (room.gameData.raceStatus === 'CALCULATING') {
                    const pushScore = async () => {
                        const myPlayer = room.players.find(p => p.id === user.uid);
                        if (!myPlayer) return;
                        
                        let updatedPlayers = [...room.players];
                        updatedPlayers = updatedPlayers.map(p => p.id === user.uid ? {...p, score: localScore} : p);
                        
                        if (room.hostId === user.uid) {
                            setTimeout(async () => {
                                const winner = updatedPlayers.reduce((max, p) => (p.score || 0) > (max.score || 0) ? p : max, updatedPlayers[0]);
                                await updateRoom({
                                    players: updatedPlayers,
                                    status: 'GAME_OVER',
                                    winnerId: winner.id,
                                    gameData: { ...room.gameData, raceStatus: 'FINISHED' }
                                });
                            }, 1000);
                        } else {
                             await updateRoom({ players: updatedPlayers });
                        }
                    };
                    pushScore();
                }
            }, [room.gameData.raceStatus]);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold text-pink-400 flex items-center gap-2"><Zap /> Corsa dei Click</div>
                    
                    {room.status === 'GAME_OVER' ? (
                        <div className="animate-bounce text-2xl font-bold text-yellow-400">
                            VINCITORE: {room.players.find(p => p.id === room.winnerId)?.name}
                        </div>
                    ) : (
                        <div className="text-6xl font-mono font-bold text-white mb-4">
                            {room.gameData.timeLeft}s
                        </div>
                    )}

                    {room.gameData.raceStatus === 'GO' && (
                        <button 
                            onClick={handleClick}
                            className="w-48 h-48 rounded-full bg-red-600 border-8 border-red-800 text-white font-bold text-2xl shadow-[0_0_50px_rgba(255,0,0,0.5)] click-btn transition-transform relative"
                        >
                            CLICK!
                            <div className="text-4xl mt-2">{localScore}</div>
                        </button>
                    )}

                    {room.gameData.raceStatus === 'READY' && room.hostId === user.uid && (
                        <button onClick={startGame} className="bg-green-600 px-8 py-4 rounded-xl text-xl font-bold animate-pulse">
                            INIZIA GARA
                        </button>
                    )}
                    
                    {room.gameData.raceStatus === 'READY' && room.hostId !== user.uid && (
                         <div className="text-xl">L'Host sta per avviare la gara... preparati!</div>
                    )}

                    {room.gameData.raceStatus === 'CALCULATING' && (
                        <div className="text-xl animate-pulse">Calcolo risultati...</div>
                    )}
                </div>
            );
        };

        const HotPotatoGame = ({ room, user, updateRoom }) => {
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            useEffect(() => {
                if (isHost && room.status === 'PLAYING') {
                    const interval = setInterval(async () => {
                        if (Date.now() > room.gameData.explosionTime) {
                            let newPlayers = [...room.players];
                            const victim = newPlayers[room.gameData.currentTurnIndex];
                            
                            victim.status = 'ELIMINATED';
                            const logMsg = `BOOM! ${victim.name} è esploso!`;

                            const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                            let nextStatus = 'PLAYING';
                            let winnerId = null;

                            if (survivors.length <= 1) {
                                nextStatus = 'GAME_OVER';
                                winnerId = survivors[0]?.id;
                            }

                            let nextIndex = room.gameData.currentTurnIndex;
                            if (survivors.length > 0) {
                                let loops = 0;
                                do {
                                    nextIndex = (nextIndex + 1) % newPlayers.length;
                                    loops++;
                                } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                            }

                            const newExplosionTime = Date.now() + Math.floor(Math.random() * 20000) + 10000;

                            await updateRoom({
                                players: newPlayers,
                                status: nextStatus,
                                winnerId: winnerId,
                                gameData: {
                                    ...room.gameData,
                                    currentTurnIndex: nextIndex,
                                    lastAction: logMsg,
                                    explosionTime: newExplosionTime
                                }
                            });
                        }
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [isHost, room.status, room.gameData.explosionTime]);

            useEffect(() => {
                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING') {
                    const passTimer = setTimeout(() => {
                        handlePass();
                    }, 1500 + Math.random() * 2000); 
                    return () => clearTimeout(passTimer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            const handlePass = async () => {
                let newPlayers = [...room.players];
                let nextIndex = room.gameData.currentTurnIndex;
                let loops = 0;
                
                do {
                    nextIndex = (nextIndex + 1) % newPlayers.length;
                    loops++;
                } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);

                await updateRoom({
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        lastAction: `${currentPlayer.name} ha passato la bomba!`
                    }
                });
            };

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center relative p-6">
                    <div className="absolute inset-0 pointer-events-none bg-red-500/10 pulse-red z-0 rounded-3xl"></div>
                    <div className="text-2xl font-bold text-red-500 flex items-center gap-2 z-10"><Bomb /> Bomba a Tempo</div>
                    
                    <div className="glass-panel p-4 rounded text-center w-full min-h-[60px] flex flex-col items-center justify-center z-10 relative">
                        <div className="text-lg font-bold animate-pulse text-red-400">
                             {room.gameData.lastAction || "La miccia è accesa..."}
                        </div>
                    </div>

                    <div className="grid grid-cols-4 sm:grid-cols-5 gap-4 w-full z-10">
                        {room.players.map((p, i) => {
                             const hasBomb = room.gameData.currentTurnIndex === i && room.status === 'PLAYING';
                             return (
                                <div key={i} className={`relative flex flex-col items-center p-2 rounded glass-panel transition-all ${hasBomb ? 'scale-110 border-2 border-red-500 bg-red-900/40' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                    {hasBomb && <div className="absolute -top-6 text-4xl bomb-shake">💣</div>}
                                    {}
                                    <img src={p.img} className="w-12 h-12 rounded-full border border-white/20" onError={(e) => e.target.src='https://placehold.co/48'}/>
                                    <span className="text-xs font-bold truncate w-full mt-1">{p.name}</span>
                                    {p.status === 'ELIMINATED' && <span className="text-red-500 text-xs font-bold uppercase">Esploso</span>}
                                </div>
                            );
                        })}
                    </div>

                    <div className="z-10 mt-8 h-24 flex items-center justify-center">
                        {isMyTurn && room.status === 'PLAYING' && (
                             <button 
                                onClick={handlePass}
                                className="bg-red-600 hover:bg-red-500 px-8 py-6 rounded-2xl text-2xl font-bold shadow-[0_0_30px_rgba(255,0,0,0.6)] animate-bounce"
                             >
                                PASSA LA BOMBA! 💣
                             </button>
                        )}
                        {!isMyTurn && room.status === 'PLAYING' && (
                            <div className="text-xl font-mono text-red-300">
                                TIC... TOC... TIC... TOC...
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ReactionGame = ({ room, user, updateRoom }) => {
            const [localFrozen, setLocalFrozen] = useState(false);

            useEffect(() => {
                if (room.hostId === user.uid && room.gameData.status === 'WAITING') {
                    const timer = setTimeout(() => {
                        updateRoom({
                            gameData: { ...room.gameData, status: 'GO', startTime: Date.now() }
                        });
                    }, 2000 + Math.random() * 4000);
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.status]);

            useEffect(() => {
                if (room.hostId === user.uid && room.gameData.status === 'GO' && !room.gameData.roundWinner) {
                    const cpuPlayers = room.players.filter(p => p.isCpu);
                    if (cpuPlayers.length > 0) {
                         const timer = setTimeout(() => {
                             if(!room.gameData.roundWinner) {
                                 const winner = cpuPlayers[Math.floor(Math.random() * cpuPlayers.length)];
                                 handleWin(winner);
                             }
                         }, 200 + Math.random() * 500);
                         return () => clearTimeout(timer);
                    }
                }
            }, [room.gameData.status]);

            const handleClick = () => {
                if (localFrozen || room.gameData.roundWinner) return;

                if (room.gameData.status === 'WAITING') {
                    setLocalFrozen(true);
                    return;
                }

                if (room.gameData.status === 'GO') {
                    const myPlayer = room.players.find(p => p.id === user.uid);
                    handleWin(myPlayer);
                }
            };

            const handleWin = async (winner) => {
                if(room.gameData.roundWinner) return;

                let newPlayers = room.players.map(p => p.id === winner.id ? {...p, score: (p.score||0) + 1} : p);
                
                await updateRoom({
                    players: newPlayers,
                    gameData: { ...room.gameData, roundWinner: winner.id, roundWinnerName: winner.name, status: 'RESULT' }
                });
            };

            const startRound = async () => {
                setLocalFrozen(false);
                await updateRoom({
                    gameData: { status: 'WAITING', roundWinner: null }
                });
            };

            const isRed = room.gameData.status === 'WAITING';
            const isGreen = room.gameData.status === 'GO';
            const isResult = room.gameData.status === 'RESULT';

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold flex items-center gap-2 text-white"><Eye /> Riflessi Lampo</div>
                    
                    <div 
                        onClick={handleClick}
                        className={`w-full h-64 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all shadow-2xl
                            ${isRed ? 'bg-red-600 hover:bg-red-700' : ''}
                            ${isGreen ? 'bg-green-500 scale-105' : ''}
                            ${isResult ? 'bg-gray-800' : ''}
                            ${localFrozen ? 'opacity-50 cursor-not-allowed' : ''}
                        `}
                    >
                        {isRed && <div className="text-4xl font-bold text-white animate-pulse">{localFrozen ? "BLOCCATO (Falsa Partenza)" : "ATTENDI..."}</div>}
                        {isGreen && <div className="text-6xl font-bold text-white">CLICCA!!!</div>}
                        {isResult && (
                            <div className="text-white">
                                <div className="text-2xl">Vincitore Round:</div>
                                <div className="text-4xl font-bold text-yellow-400">{room.gameData.roundWinnerName}</div>
                            </div>
                        )}
                        {!isRed && !isGreen && !isResult && <div className="text-xl">Premi start per iniziare</div>}
                    </div>

                    <div className="grid grid-cols-4 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                            <div key={i} className="flex flex-col items-center glass-panel p-2 rounded">
                                {}
                                <img src={p.img} className="w-8 h-8 rounded-full" onError={(e) => e.target.src='https://placehold.co/32'}/>
                                <span className="text-xs truncate w-full">{p.name}</span>
                                <span className="font-bold text-yellow-400">{p.score} PT</span>
                            </div>
                        ))}
                    </div>

                    {room.hostId === user.uid && (
                        <div className="flex gap-4 mt-6">
                            <button onClick={startRound} className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold">
                                {isResult ? "Prossimo Round" : "Inizia Round"}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const MathGame = ({ room, user, updateRoom }) => {
            const [localFrozen, setLocalFrozen] = useState(false);

            const generateQuestion = () => {
                const ops = ['+', '-', '*'];
                const op = ops[Math.floor(Math.random() * ops.length)];
                let a, b;

                if (op === '+') {
                    a = Math.floor(Math.random() * 90) + 10;
                    b = Math.floor(Math.random() * 90) + 10;
                } else if (op === '-') {
                    a = Math.floor(Math.random() * 90) + 10;
                    b = Math.floor(Math.random() * 90) + 10;
                } else {
                    a = Math.floor(Math.random() * 13) + 3;
                    b = Math.floor(Math.random() * 13) + 3;
                }
                
                let ans = 0;
                if (op === '+') ans = a + b;
                if (op === '-') ans = a - b;
                if (op === '*') ans = a * b;

                let options = new Set([ans]);
                while(options.size < 4) {
                    let deviation = Math.floor(Math.random() * 11) - 5; 
                    if (deviation === 0) deviation = 1;
                    
                    if (Math.random() > 0.7) deviation = Math.floor(Math.random() * 41) - 20;

                    let fake = ans + deviation;
                    if(fake !== ans) options.add(fake);
                }
                
                return { 
                    text: `${a} ${op} ${b} = ?`, 
                    ans: ans, 
                    options: Array.from(options).sort(() => Math.random() - 0.5) 
                };
            };

            const startRound = async () => {
                const q = generateQuestion();
                await updateRoom({
                    gameData: { 
                        question: q.text, 
                        answer: q.ans, 
                        options: q.options, 
                        roundWinner: null 
                    }
                });
            };

            const handleOptionClick = (val) => {
                if (localFrozen || room.gameData.roundWinner) return;

                if (val === room.gameData.answer) {
                    const myPlayer = room.players.find(p => p.id === user.uid);
                    handleWin(myPlayer);
                } else {
                    setLocalFrozen(true);
                    setTimeout(() => setLocalFrozen(false), 2000);
                }
            };

            const handleWin = async (winner) => {
                if(room.gameData.roundWinner) return;

                let newPlayers = room.players.map(p => p.id === winner.id ? {...p, score: (p.score||0) + 10} : p);
                
                await updateRoom({
                    players: newPlayers,
                    gameData: { ...room.gameData, roundWinner: winner.id, roundWinnerName: winner.name }
                });
            };

            useEffect(() => {
                if (room.hostId === user.uid && !room.gameData.roundWinner && room.gameData.question) {
                     const cpuPlayers = room.players.filter(p => p.isCpu);
                     if (cpuPlayers.length > 0) {
                         const timer = setTimeout(() => {
                             if(!room.gameData.roundWinner) {
                                 if (Math.random() > 0.3) {
                                     const winner = cpuPlayers[Math.floor(Math.random() * cpuPlayers.length)];
                                     handleWin(winner);
                                 }
                             }
                         }, 2000 + Math.random() * 3000);
                         return () => clearTimeout(timer);
                     }
                }
            }, [room.gameData.question, room.gameData.roundWinner]);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold flex items-center gap-2 text-pink-400"><Brain /> Matematica Folle</div>

                    <div className="w-full glass-panel p-8 rounded-2xl mb-4">
                        {room.gameData.roundWinner ? (
                            <div className="animate-bounce">
                                <div className="text-xl">Risposta Corretta!</div>
                                <div className="text-3xl font-bold text-green-400">{room.gameData.answer}</div>
                                <div className="mt-2 text-yellow-400 font-bold">{room.gameData.roundWinnerName} vince!</div>
                            </div>
                        ) : (
                            <div className="text-5xl font-mono font-bold text-white tracking-wider">
                                {room.gameData.question || "Pronti?"}
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-2 gap-4 w-full">
                        {room.gameData.options?.map((opt, i) => (
                            <button 
                                key={i}
                                onClick={() => handleOptionClick(opt)}
                                disabled={!!room.gameData.roundWinner || localFrozen}
                                className={`h-20 text-3xl font-bold rounded-xl transition-transform hover:scale-105 active:scale-95
                                    ${room.gameData.roundWinner && opt === room.gameData.answer ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-500'}
                                    ${localFrozen ? 'bg-gray-600 opacity-50' : ''}
                                `}
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    {localFrozen && <div className="text-red-500 font-bold animate-pulse">SBAGLIATO! (Bloccato 2s)</div>}

                    <div className="grid grid-cols-4 gap-2 w-full mt-8">
                        {room.players.map((p, i) => (
                            <div key={i} className="flex flex-col items-center glass-panel p-2 rounded">
                                {}
                                <img src={p.img} className="w-8 h-8 rounded-full" onError={(e) => e.target.src='https://placehold.co/32'}/>
                                <span className="text-xs truncate w-full">{p.name}</span>
                                <span className="font-bold text-yellow-400">{p.score} PT</span>
                            </div>
                        ))}
                    </div>

                    {room.hostId === user.uid && (
                        <div className="flex gap-4 mt-6">
                            <button onClick={startRound} className="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-bold">
                                Nuova Domanda
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const Podium = ({ room, user, updateRoom }) => {
            const isHost = room.hostId === user.uid;

            const getSortedPlayers = () => {
                let players = [...room.players];
                const isScoreBased = ['CLICK_RACE', 'DETONATOR', 'REACTION', 'MATH'].includes(room.selectedGame);
                
                return players.sort((a, b) => {
                    if (a.id === room.winnerId) return -1;
                    if (b.id === room.winnerId) return 1;
                    
                    const aElim = a.status === 'ELIMINATED';
                    const bElim = b.status === 'ELIMINATED';
                    if (aElim && !bElim) return 1;
                    if (!aElim && bElim) return -1;
                    
                    if (isScoreBased) {
                        return (b.score || 0) - (a.score || 0);
                    } else {
                        if (a.eliminatedRound !== b.eliminatedRound) {
                            return (b.eliminatedRound || 0) - (a.eliminatedRound || 0);
                        }
                        if (a.hp !== b.hp) {
                            return (b.hp || 0) - (a.hp || 0);
                        }
                        return (b.score || 0) - (a.score || 0);
                    }
                });
            };

            const sorted = getSortedPlayers();
            const first = sorted[0];
            const second = sorted[1];
            const third = sorted[2];
            const rest = sorted.slice(3);

            return (
                <div className="w-full max-w-3xl flex flex-col items-center gap-6 animate-rise">
                    <div className="text-center">
                        <div className="text-yellow-400 animate-pulse text-4xl md:text-5xl font-extrabold tracking-widest mb-2 flex items-center justify-center gap-3">
                            <Trophy size={40} /> CLASSIFICA FINALE <Trophy size={40} />
                        </div>
                        <p className="text-gray-400 text-sm uppercase tracking-wider">La battaglia della modalità {room.selectedGame} è conclusa!</p>
                    </div>

                    <div className="flex items-end justify-center w-full max-w-xl h-80 px-4 mt-8 relative">
                        {/* 2° Posto - ARGENTO */}
                        {second && (
                            <div className="flex flex-col items-center flex-1 z-10">
                                <div className="relative group flex flex-col items-center">
                                    {}
                                    <img src={second.img} className="w-16 h-16 rounded-full border-2 border-slate-300 object-cover shadow-[0_0_15px_rgba(148,163,184,0.5)] mb-2" onError={(e) => e.target.src='https://placehold.co/64'} />
                                    <div className="absolute -top-6 text-slate-300"><Star size={20} fill="currentColor" /></div>
                                    <span className="text-xs font-bold text-slate-300 text-center truncate w-24 mb-1">{second.name}</span>
                                    {second.status === 'ELIMINATED' && second.eliminatedRound && (
                                        <span className="text-[10px] text-red-400 font-semibold mb-1">Eliminato Rd {second.eliminatedRound}</span>
                                    )}
                                </div>
                                <div className="podium-silver w-full h-32 rounded-t-xl flex flex-col items-center justify-center">
                                    <span className="text-4xl font-black text-slate-300 font-mono">2</span>
                                    <span className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Argento</span>
                                    {second.score !== undefined && <span className="text-xs text-blue-400 mt-1">{second.score} PT</span>}
                                </div>
                            </div>
                        )}

                        {/* 1° Posto - ORO */}
                        {first && (
                            <div className="flex flex-col items-center flex-1 z-20 -mx-2">
                                <div className="relative flex flex-col items-center animate-bounce" style={{ animationDuration: '3s' }}>
                                    {}
                                    <img src={first.img} className="w-20 h-20 rounded-full border-4 border-yellow-400 object-cover shadow-[0_0_25px_rgba(234,179,8,0.7)] mb-2" onError={(e) => e.target.src='https://placehold.co/80'} />
                                    <div className="absolute -top-7 text-yellow-400 animate-pulse"><Crown size={28} /></div>
                                    <span className="text-sm font-black text-yellow-400 text-center truncate w-28 mb-1">{first.name}</span>
                                </div>
                                <div className="podium-gold w-full h-44 rounded-t-xl flex flex-col items-center justify-center relative">
                                    <span className="text-5xl font-black text-yellow-400 font-mono">1</span>
                                    <span className="text-[10px] text-yellow-500 uppercase tracking-widest font-bold">Campione</span>
                                    {first.score !== undefined && <span className="text-xs text-yellow-300 mt-1 font-bold">{first.score} PT</span>}
                                </div>
                            </div>
                        )}

                        {/* 3° Posto - BRONZO */}
                        {third ? (
                            <div className="flex flex-col items-center flex-1 z-10">
                                <div className="relative group flex flex-col items-center">
                                    {}
                                    <img src={third.img} className="w-14 h-14 rounded-full border-2 border-amber-600 object-cover shadow-[0_0_12px_rgba(180,83,9,0.5)] mb-2" onError={(e) => e.target.src='https://placehold.co/56'} />
                                    <span className="text-xs font-bold text-amber-600 text-center truncate w-24 mb-1">{third.name}</span>
                                    {third.status === 'ELIMINATED' && third.eliminatedRound && (
                                        <span className="text-[10px] text-red-400 font-semibold mb-1">Eliminato Rd {third.eliminatedRound}</span>
                                    )}
                                </div>
                                <div className="podium-bronze w-full h-24 rounded-t-xl flex flex-col items-center justify-center">
                                    <span className="text-3xl font-black text-amber-600 font-mono">3</span>
                                    <span className="text-[10px] text-amber-700 uppercase tracking-widest font-bold">Bronzo</span>
                                    {third.score !== undefined && <span className="text-xs text-blue-400 mt-1">{third.score} PT</span>}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1"></div>
                        )}
                    </div>

                    {/* Altri corridori dal 4° posto in giù */}
                    {rest.length > 0 && (
                        <div className="w-full max-w-xl bg-black/30 border border-white/5 p-4 rounded-xl mt-2 max-h-36 overflow-y-auto">
                            <div className="text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Altri Corridori</div>
                            <div className="space-y-2">
                                {rest.map((p, i) => (
                                    <div key={i} className="flex items-center justify-between bg-white/5 p-2 rounded border border-white/5">
                                        <div className="flex items-center gap-3">
                                            <span className="text-xs font-mono text-gray-400 font-bold">{i + 4}°</span>
                                            {}
                                            <img src={p.img} className="w-8 h-8 rounded-full border border-white/20" onError={(e) => e.target.src='https://placehold.co/32'}/>
                                            <div className="flex flex-col">
                                                <span className="text-sm font-medium text-gray-300">{p.name}</span>
                                                {p.status === 'ELIMINATED' && (
                                                    <span className="text-[10px] text-red-400">Eliminato Round {p.eliminatedRound || '-'}</span>
                                                )}
                                            </div>
                                        </div>
                                        <span className="text-xs text-gray-400">{p.score !== undefined ? `${p.score} PT` : ''}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="mt-4">
                        {isHost ? (
                            <button 
                                onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })}
                                className="bg-green-600 hover:bg-green-500 text-white font-bold px-8 py-3 rounded-xl transition-all shadow-lg hover:shadow-green-500/30 transform hover:scale-105"
                            >
                                Torna alla Lobby
                            </button>
                        ) : (
                            <div className="text-gray-400 text-sm animate-pulse italic">In attesa che l'Host torni alla lobby...</div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [roomId, setRoomId] = useState(null);
            const [inputRoomId, setInputRoomId] = useState("");
            const [selectedChar, setSelectedChar] = useState(null);
            const [initialHp, setInitialHp] = useState(50);
            const [showCharSelector, setShowCharSelector] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);

            const { data: room, loading } = useRoom(roomId, user);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Errore di autenticazione Firebase:", err);
                        setErrorMsg("Impossibile connettersi al database PartyVerse. Riprova più tardi.");
                    }
                };
                initAuth();
                
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    if(u) setUser(u); 
                });
                return () => unsubscribe();
            }, []);

            const createRoom = async () => {
                if (!user) {
                    setErrorMsg("Connessione a Firebase in corso... Attendi un secondo e riprova!");
                    return;
                }
                if(!selectedChar) {
                    setErrorMsg("Seleziona prima un personaggio dalla griglia!");
                    return;
                }
                const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(newRoomId);
                
                try {
                    await roomRef.set({
                        hostId: user.uid,
                        status: 'LOBBY',
                        selectedGame: 'SURVIVAL',
                        config: { initialHp: 50 },
                        players: [{
                            id: user.uid,
                            name: selectedChar.name,
                            img: selectedChar.img,
                            isCpu: false,
                            hp: 50,
                            score: 0,
                            hand: []
                        }],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setRoomId(newRoomId);
                } catch (err) {
                    console.error("Errore durante la creazione della stanza:", err);
                    setErrorMsg("Errore di rete nell'avviare la stanza. Verifica i permessi o la connessione.");
                }
            };

            const joinRoom = async () => {
                if (!user) {
                    setErrorMsg("Connessione a Firebase in corso... Attendi un secondo!");
                    return;
                }
                if(!selectedChar) {
                    setErrorMsg("Seleziona prima un personaggio per entrare!");
                    return;
                }
                if(!inputRoomId) {
                    setErrorMsg("Devi inserire il codice di una stanza!");
                    return;
                }
                const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(inputRoomId.toUpperCase());
                try {
                    await db.runTransaction(async (t) => {
                        const doc = await t.get(roomRef);
                        if (!doc.exists) throw "Stanza non trovata. Controlla il codice inserito!";
                        const data = doc.data();
                        if (data.status !== 'LOBBY') throw "La partita in questa stanza è già in corso!";
                        
                        const newPlayers = [...data.players, {
                            id: user.uid,
                            name: selectedChar.name,
                            img: selectedChar.img,
                            isCpu: false,
                            hp: 50,
                            score: 0,
                            hand: []
                        }];
                        t.update(roomRef, { players: newPlayers });
                    });
                    setRoomId(inputRoomId.toUpperCase());
                } catch (e) { 
                    setErrorMsg(e.toString()); 
                }
            };

            const addCpu = async () => {
                if (!room || room.hostId !== user.uid) return;
                const usedNames = room.players.map(p => p.name);
                const available = CHARACTERS.filter(c => !usedNames.includes(c.name));
                if(available.length === 0) {
                    setErrorMsg("Hai già aggiunto tutti i personaggi disponibili nel roster!");
                    return;
                }
                const randomChar = available[Math.floor(Math.random() * available.length)];
                
                const newPlayers = [...room.players, {
                    id: 'CPU_' + Date.now(),
                    name: randomChar.name,
                    img: randomChar.img,
                    isCpu: true,
                    hp: 50,
                    score: 0,
                    hand: []
                }];
                await updateRoom({ players: newPlayers });
            };

            const removeCpu = async (cpuId) => {
                if (!room || room.hostId !== user.uid) return;
                const newPlayers = room.players.filter(p => p.id !== cpuId);
                await updateRoom({ players: newPlayers });
            };

            const changeCharacter = async (char) => {
                setSelectedChar(char);
                setShowCharSelector(false);
                if (room && roomId) {
                    const newPlayers = room.players.map(p => p.id === user.uid ? { ...p, name: char.name, img: char.img } : p);
                    await updateRoom({ players: newPlayers });
                }
            };

            const startGame = async () => {
                if (!room || room.hostId !== user.uid) return;
                
                // Mescola l'ordine dei giocatori casualmente prima di iniziare
                let shuffledPlayers = [...room.players].sort(() => Math.random() - 0.5);
                const firstPlayerIndex = Math.floor(Math.random() * shuffledPlayers.length);
                
                let gameData = {
                    currentTurnIndex: firstPlayerIndex,
                    round: 1,
                    lastAction: "La battaglia è cominciata!",
                    roundSummary: null
                };

                let hpToSet = (room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE' || room.selectedGame === 'CYBER_DECK') ? initialHp : 50;
                
                if(room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE' || room.selectedGame === 'CYBER_DECK') {
                    await updateRoom({ config: { initialHp: hpToSet } });
                }

                // Generazione mazzo per modalità a carte
                const getRandomCardId = () => Math.ceil(Math.random() * 24);

                let resetPlayers = shuffledPlayers.map(p => ({
                    ...p,
                    hp: hpToSet, 
                    score: 0,
                    status: 'ACTIVE',
                    eliminatedRound: null,
                    damageTakenRound: 0,
                    spineRounds: 0,
                    regenTurns: 0,
                    skipNextTurn: false,
                    keyloggedBy: null,
                    keylogTimer: 0,
                    // Distribuisce 3 carte casuali a tutti all'inizio
                    hand: [getRandomCardId(), getRandomCardId(), getRandomCardId()]
                }));

                if(room.selectedGame === 'CLICK_RACE') {
                    gameData.raceStatus = 'READY';
                    gameData.timeLeft = 10;
                }

                if(room.selectedGame === 'HOT_POTATO') {
                    gameData.explosionTime = Date.now() + Math.floor(Math.random() * 15000) + 10000;
                }

                if(room.selectedGame === 'REACTION') {
                    gameData.status = 'WAITING';
                    gameData.roundWinner = null;
                }

                if(room.selectedGame === 'MATH') {
                    gameData.question = null;
                    gameData.roundWinner = null;
                }

                await updateRoom({
                    status: 'PLAYING',
                    players: resetPlayers,
                    gameData: gameData
                });
            };

            const updateRoom = async (data) => {
                if(!roomId) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId).update(data);
                } catch (err) {
                    console.error("Errore aggiornamento stanza:", err);
                    setErrorMsg("Impossibile salvare i dati della partita. Controlla la rete.");
                }
            };

            // Selettore dei personaggi
            const CharacterSelector = () => (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                    <div className="bg-[#1a1a2e] p-6 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto border border-white/20 animate-fade-in">
                        <h2 className="text-2xl font-bold mb-4">Scegli Personaggio</h2>
                        <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">
                            {CHARACTERS.map((char, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => changeCharacter(char)}
                                    className={`cursor-pointer rounded-lg overflow-hidden border-2 transition-all character-card relative aspect-square hover:border-pink-500`}
                                >
                                    {}
                                    <img src={char.img} alt={char.name} className="w-full h-full object-cover" loading="lazy" onError={(e) => e.target.src='https://placehold.co/64'} />
                                    <div className="absolute bottom-0 w-full bg-black/60 text-[9px] text-white text-center py-1 truncate px-1">{char.name}</div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setShowCharSelector(false)} className="mt-4 bg-gray-600 px-4 py-2 rounded">Chiudi</button>
                    </div>
                </div>
            );

            const ErrorModal = () => {
                if (!errorMsg) return null;
                return (
                    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-[#1a1a2e] border-2 border-red-500 shadow-2xl shadow-red-500/50 p-6 rounded-2xl w-full max-w-sm flex flex-col items-center text-center">
                            <div className="text-red-500 mb-3"><AlertCircle size={48} /></div>
                            <h3 className="text-xl font-bold text-white mb-2">ATTENZIONE</h3>
                            <p className="text-gray-300 text-sm mb-6">{errorMsg}</p>
                            <button 
                                onClick={() => setErrorMsg(null)}
                                className="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-2 rounded-xl transition-all w-full"
                            >
                                OK, RICEVUTO
                            </button>
                        </div>
                    </div>
                );
            };

            if (!user) return <div className="h-screen flex items-center justify-center text-white">Caricamento PartyVerse...</div>;

            if (!roomId) {
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center">
                        <ErrorModal />
                        <header className="mb-8 text-center">
                            <h1 className="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2">PARTYVERSE</h1>
                            <p className="text-gray-400">Roster Royale Edition</p>
                        </header>

                        <div className="w-full max-w-4xl glass-panel rounded-2xl p-6 mb-8">
                            <h2 className="text-xl mb-4 font-bold flex items-center gap-2"><Users /> Seleziona il tuo Campione</h2>
                            <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 max-h-[40vh] overflow-y-auto pr-2">
                                {CHARACTERS.map((char, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => setSelectedChar(char)}
                                        className={`cursor-pointer rounded-lg overflow-hidden border-2 transition-all character-card relative aspect-square ${selectedChar?.name === char.name ? 'border-pink-500 ring-2 ring-pink-500' : 'border-transparent opacity-70 hover:opacity-100'}`}
                                    >
                                        {}
                                        <img src={char.img} alt={char.name} className="w-full h-full object-cover" loading="lazy" onError={(e) => e.target.src='https://placehold.co/64'} />
                                        <div className="absolute bottom-0 w-full bg-black/60 text-[9px] text-white text-center py-1 truncate px-1">
                                            {char.name}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row gap-6 w-full max-w-2xl">
                            <div className="flex-1 glass-panel p-6 rounded-xl flex flex-col items-center">
                                <h3 className="text-xl font-bold mb-4">Crea Partita</h3>
                                <button 
                                    onClick={createRoom}
                                    className="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-lg font-bold hover:scale-105 transition-transform"
                                >
                                    CREA STANZA
                                </button>
                            </div>
                            <div className="flex-1 glass-panel p-6 rounded-xl flex flex-col items-center">
                                <h3 className="text-xl font-bold mb-4">Unisciti</h3>
                                <input 
                                    type="text" 
                                    placeholder="CODICE STANZA" 
                                    value={inputRoomId}
                                    onChange={e => setInputRoomId(e.target.value.toUpperCase())}
                                    className="w-full bg-black/30 border border-white/20 rounded p-2 mb-4 text-center tracking-widest uppercase font-mono"
                                />
                                <button 
                                    onClick={joinRoom}
                                    className="w-full py-3 bg-gradient-to-r from-pink-600 to-red-600 rounded-lg font-bold hover:scale-105 transition-transform"
                                >
                                    ENTRA
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (loading || !room) return <div className="h-screen flex items-center justify-center">Sincronizzazione...</div>;

            if (room.status === 'GAME_OVER') {
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center justify-center">
                        <Podium room={room} user={user} updateRoom={updateRoom} />
                    </div>
                );
            }

            // --- VISTA LOBBY ---
            if (room.status === 'LOBBY') {
                const isHost = room.hostId === user.uid;
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center">
                        <ErrorModal />
                        {showCharSelector && <CharacterSelector />}
                        
                        <div className="w-full max-w-4xl flex justify-between items-center mb-8 glass-panel p-4 rounded-xl">
                            <div>
                                <h2 className="text-gray-400 text-sm">CODICE STANZA</h2>
                                <h1 className="text-3xl font-mono font-bold tracking-widest text-pink-400 select-all">{roomId}</h1>
                            </div>
                            <button onClick={() => setRoomId(null)} className="text-sm bg-gray-700 px-3 py-1 rounded">Esci</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
                            <div className="glass-panel p-6 rounded-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold">Giocatori ({room.players.length})</h3>
                                    {isHost && (
                                        <button onClick={addCpu} className="bg-purple-600 hover:bg-purple-500 px-3 py-1 rounded text-sm flex items-center gap-1">
                                            <UserPlus size={16}/> CPU
                                        </button>
                                    )}
                                </div>
                                <div className="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto">
                                    {room.players.map((p, i) => (
                                        <div key={i} className="flex items-center gap-3 bg-white/5 p-2 rounded-lg relative group">
                                            <div className="w-10 h-10 rounded-full overflow-hidden border border-white/30 cursor-pointer" onClick={() => p.id === user.uid && setShowCharSelector(true)}>
                                                {}
                                                <img src={p.img} className="w-full h-full object-cover" onError={(e) => e.target.src='https://placehold.co/40'}/>
                                            </div>
                                            <div className="truncate flex-1">
                                                <div className="font-bold text-sm truncate">{p.name}</div>
                                                {p.id === room.hostId && <span className="text-[10px] bg-yellow-600 px-1 rounded text-white">HOST</span>}
                                                {p.isCpu && <span className="text-[10px] bg-purple-600 px-1 rounded text-white ml-1">CPU</span>}
                                            </div>
                                            {p.id === user.uid && (
                                                <button onClick={() => setShowCharSelector(true)} className="absolute right-2 top-2 bg-blue-500 p-1 rounded-full opacity-50 hover:opacity-100">
                                                    <Edit size={12}/>
                                                </button>
                                            )}
                                            {isHost && p.isCpu && (
                                                <button onClick={() => removeCpu(p.id)} className="absolute right-2 top-2 bg-red-500 p-1 rounded-full opacity-0 group-hover:opacity-100">
                                                    <Trash2 size={12}/>
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-panel p-6 rounded-xl flex flex-col justify-between">
                                <div>
                                    <h3 className="text-xl font-bold mb-4">Configurazione Gioco</h3>
                                    {isHost ? (
                                        <div className="flex flex-col gap-3 max-h-[50vh] overflow-y-auto pr-2">
                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'CYBER_DECK' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'CYBER_DECK' ? 'bg-cyan-500/20 border-cyan-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-cyan-500 p-2 rounded-full text-white"><BookOpen size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold text-cyan-400">Mazzo Cybernetico (24 Carte)</div>
                                                    <div className="text-xs opacity-70">Strategia • Carte Neon • Tattica</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'SURVIVAL' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'SURVIVAL' ? 'bg-red-500/20 border-red-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-red-500 p-2 rounded-full text-white"><Skull size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">L'Ultimo Sopravvissuto</div>
                                                    <div className="text-xs opacity-70">Eliminazione • Dadi • Fortuna</div>
                                                </div>
                                            </button>

                                             <button 
                                                onClick={() => updateRoom({ selectedGame: 'CURSED_DICE' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'CURSED_DICE' ? 'bg-purple-500/20 border-purple-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-purple-500 p-2 rounded-full text-white"><Dices size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Dadi Maledetti</div>
                                                    <div className="text-xs opacity-70">Caos • Imprevedibile • RNG</div>
                                                </div>
                                            </button>
                                            
                                            {(room.selectedGame === 'SURVIVAL' || room.selectedGame === 'CURSED_DICE' || room.selectedGame === 'CYBER_DECK') && (
                                                <div className="bg-white/5 p-3 rounded-lg border border-white/10">
                                                    <label className="text-sm text-gray-300 block mb-2">HP Iniziali: <span className="font-bold text-white">{initialHp}</span></label>
                                                    <input 
                                                        type="range" 
                                                        min="10" 
                                                        max="50" 
                                                        value={initialHp} 
                                                        onChange={(e) => setInitialHp(parseInt(e.target.value))}
                                                        className="w-full accent-red-500"
                                                    />
                                                </div>
                                            )}

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'DETONATOR' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'DETONATOR' ? 'bg-red-700/20 border-red-700' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-red-700 p-2 rounded-full text-white"><Power size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Il Detonatore</div>
                                                    <div className="text-xs opacity-70">Rischio • Eliminazione • Fortuna</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'CLICK_RACE' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'CLICK_RACE' ? 'bg-pink-500/20 border-pink-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-pink-500 p-2 rounded-full text-white"><Zap size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Corsa dei Click</div>
                                                    <div className="text-xs opacity-70">Riflessi • Click • Caos</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'HOT_POTATO' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'HOT_POTATO' ? 'bg-orange-500/20 border-orange-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-orange-500 p-2 rounded-full text-white"><Bomb size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Bomba a Tempo</div>
                                                    <div className="text-xs opacity-70">Eliminazione • Panico</div>
                                                </div>
                                            </button>

                                             <button 
                                                onClick={() => updateRoom({ selectedGame: 'REACTION' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'REACTION' ? 'bg-green-500/20 border-green-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-green-500 p-2 rounded-full text-white"><Eye size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Riflessi Lampo</div>
                                                    <div className="text-xs opacity-70">Reazione • Attenzione</div>
                                                </div>
                                            </button>

                                            <button 
                                                onClick={() => updateRoom({ selectedGame: 'MATH' })}
                                                className={`p-4 rounded-xl border flex items-center gap-3 transition-all ${room.selectedGame === 'MATH' ? 'bg-indigo-500/20 border-indigo-500' : 'border-white/10 hover:bg-white/5'}`}
                                            >
                                                <div className="bg-indigo-500 p-2 rounded-full text-white"><Brain size={20} /></div>
                                                <div className="text-left flex-1">
                                                    <div className="font-bold">Matematica Folle</div>
                                                    <div className="text-xs opacity-70">Logica • Velocità</div>
                                                </div>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 opacity-60 italic">
                                            L'host sta scegliendo il gioco...
                                        </div>
                                    )}
                                </div>
                                
                                {isHost ? (
                                    <button 
                                        onClick={startGame}
                                        className="w-full mt-6 py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold text-xl shadow-lg flex items-center justify-center gap-2"
                                    >
                                        <Play /> AVVIA PARTITA
                                    </button>
                                ) : (
                                    <div className="text-center text-sm animate-pulse mt-6">In attesa dell'Host...</div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- INSTRADAMENTO MODALITÀ ATTIVA ---
            if (room.selectedGame === 'SURVIVAL') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><SurvivalGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'CURSED_DICE') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><CursedDiceGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'CYBER_DECK') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><CyberDeckGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'DETONATOR') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><DetonatorGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'CLICK_RACE') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><ClickRaceGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'HOT_POTATO') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><HotPotatoGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'REACTION') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><ReactionGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else if (room.selectedGame === 'MATH') {
                return <div className="min-h-screen p-4 flex flex-col items-center justify-center"><MathGame room={room} user={user} updateRoom={updateRoom} /></div>;
            } else {
                return <div>Errore: Gioco sconosciuto</div>;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
