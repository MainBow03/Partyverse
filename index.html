    <style>
        body { background-color: #1a1a2e; color: #e94560; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .character-card:hover { transform: scale(1.05); border-color: #e94560; }
        .dice-roll { animation: roll 0.5s ease-in-out infinite; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f3460; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
        
        /* D-Pad Styles */
        .dpad-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.2s; }
        .dpad-btn:active { background: rgba(233, 69, 96, 0.5); transform: scale(0.95); }

        /* Click Race Button */
        .click-btn:active { transform: scale(0.95); background-color: #ff2e63; }

        /* Animation for Bomb */
        .bomb-shake { animation: shake 0.5s infinite; }
        @keyframes shake { 
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .pulse-red { animation: pulse-red 1s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        
        /* Shield Animation */
        .shield-pulse { animation: shieldPulse 2s infinite; }
        @keyframes shieldPulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); border-color: rgba(59, 130, 246, 0.8); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.2); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.8); }
        }

        function useRoom(roomId, user) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!roomId || !user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId)
                    .onSnapshot(doc => {
                        if (doc.exists) setData(doc.data());
                        else setData(null);
                        setLoading(false);
                    }, err => console.error(err));
                return unsub;
            }, [roomId, user]);
            
            return { data, loading };
        }

        const PlayerBadge = ({ player, isCurrentTurn, isWinner, onClick, canBeTargeted, maxHp }) => {
            const getHpColor = (current, max) => {
                const percentage = (current / max) * 100;
                if (percentage > 75) return 'bg-green-800'; 
                if (percentage > 50) return 'bg-green-500';
                if (percentage > 25) return 'bg-orange-500'; 
                if (percentage > 10) return 'bg-red-500';
                return 'bg-red-900'; 
            }

            return (
                <div 
                    onClick={() => canBeTargeted && onClick && onClick(player)}
                    className={`relative flex flex-col items-center p-2 rounded-xl transition-all duration-300
                        ${isCurrentTurn ? 'bg-yellow-500/20 border-2 border-yellow-500 z-10 scale-105' : 'glass-panel'} 
                        ${player.status === 'ELIMINATED' ? 'opacity-40 grayscale' : ''}
                        ${canBeTargeted ? 'cursor-pointer hover:bg-red-500/30 hover:scale-110 hover:border-red-500 animate-pulse border-2 border-red-500/50' : ''}
                        ${player.invulnerable ? 'shield-pulse border-2 border-blue-500' : ''}
                    `}
                >
                    {isWinner && <div className="absolute -top-4 text-yellow-400"><Trophy size={32} /></div>}
                    {player.invulnerable && <div className="absolute top-0 left-0 text-blue-400 z-20 bg-black/50 rounded-full p-1"><Shield size={16} /></div>}
                    <div className="w-16 h-16 rounded-full overflow-hidden border-2 border-white/20 mb-2 relative">
                        <img src={player.img} alt={player.name} className="w-full h-full object-cover" onError={(e) => e.target.src='https://via.placeholder.com/64?text=?'}/>
                        {player.status === 'ELIMINATED' && <div className="absolute inset-0 bg-black/70 flex items-center justify-center text-red-500"><Skull /></div>}
                    </div>
                    <div className="text-xs font-bold text-center truncate w-full">{player.name}</div>
                    <div className="flex gap-1 mt-1 text-xs">
                        {player.hp !== undefined && <span className={`${getHpColor(player.hp, maxHp || 50)} px-1 rounded text-white transition-colors`}>HP {player.hp}</span>}
                        {player.score !== undefined && <span className="bg-blue-500/80 px-1 rounded text-white">PT {player.score}</span>}
                    </div>
                    {player.isCpu && <span className="absolute top-0 right-0 bg-purple-600 text-[10px] px-1 rounded-bl">CPU</span>}
                </div>
            );
        }

        // ... existing SurvivalGame component ...
        const SurvivalGame = ({ room, user, updateRoom }) => {
            const [turnPhase, setTurnPhase] = useState('ROLL');
            const [currentDamage, setCurrentDamage] = useState(0);
            const [rolling, setRolling] = useState(false);

            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            // --- LOGICA CPU ---
            useEffect(() => {
                if (room.gameData.roundSummary) return;

                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING') {
                    const cpuTurn = async () => {
                        await new Promise(r => setTimeout(r, 1000));
                        const roll = Math.ceil(Math.random() * 6);
                        const validTargets = room.players
                            .map((p, index) => ({...p, originalIndex: index}))
                            .filter(p => p.status !== 'ELIMINATED' && p.id !== currentPlayer.id);
                        
                        if (validTargets.length === 0) return;
                        const randomTarget = validTargets[Math.floor(Math.random() * validTargets.length)];
                        await executeAttack(roll, randomTarget.originalIndex, `CPU ${currentPlayer.name}`);
                    };
                    cpuTurn();
                }
            }, [room.gameData.currentTurnIndex, room.status, room.gameData.roundSummary]);

            const executeAttack = async (damage, targetIndex, attackerName) => {
                let newPlayers = [...room.players];
                const target = newPlayers[targetIndex];
                const attacker = newPlayers[room.gameData.currentTurnIndex];
                
                target.hp -= damage;
                target.damageTakenRound = (target.damageTakenRound || 0) + damage;
                attacker.score = (attacker.score || 0) + damage;

                let logMsg = `${attackerName} ha inflitto ${damage} danni a ${target.name}!`;

                if (target.hp <= 0) {
                    target.hp = 0;
                    target.status = 'ELIMINATED';
                    target.eliminatedRound = room.gameData.round;
                    logMsg += " ELIMINATO!";
                }

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id;
                    logMsg = `${survivors[0]?.name} HA VINTO LA BATTAGLIA!`;
                }

                let nextIndex = room.gameData.currentTurnIndex;
                let loops = 0;
                let currentRound = room.gameData.round;
                let roundSummary = room.gameData.roundSummary || null;

                do {
                    nextIndex = (nextIndex + 1) % newPlayers.length;
                    
                    if(nextIndex === 0) {
                        currentRound++;
                        const damageRanking = newPlayers
                            .filter(p => (p.damageTakenRound || 0) > 0)
                            .sort((a,b) => b.damageTakenRound - a.damageTakenRound)
                            .slice(0, 3)
                            .map(p => ({
                                name: p.name,
                                img: p.img,
                                damageTakenRound: p.damageTakenRound
                            }));
                        
                        roundSummary = damageRanking.length > 0 ? damageRanking : null;
                        newPlayers.forEach(p => p.damageTakenRound = 0);
                    }
                    loops++;
                } while (newPlayers[nextIndex].status === 'ELIMINATED' && survivors.length > 1 && loops < newPlayers.length * 2);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: currentRound,
                        lastAction: logMsg,
                        lastRoll: damage,
                        roundSummary: roundSummary
                    },
                    winnerId: winnerId
                });
            };

            const handleHumanRoll = async () => {
                if (rolling) return;
                setRolling(true);
                await new Promise(r => setTimeout(r, 600));
                const roll = Math.ceil(Math.random() * 6);
                setCurrentDamage(roll);
                setTurnPhase('TARGET');
                setRolling(false);
            };

            const handleTargetClick = (targetPlayer) => {
                const targetIndex = room.players.findIndex(p => p.id === targetPlayer.id);
                if (targetIndex === -1) return;
                setTurnPhase('ROLL');
                setCurrentDamage(0);
                executeAttack(currentDamage, targetIndex, currentPlayer.name);
            };

            const dismissRoundSummary = async () => {
                await updateRoom({
                    gameData: { ...room.gameData, roundSummary: null }
                });
            };

            const RoundSummaryBanner = () => {
                if (!room.gameData.roundSummary) return null;
                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                        <div className="bg-[#1a1a2e] border-2 border-red-500 rounded-2xl p-6 w-full max-w-md animate-bounce-in shadow-2xl shadow-red-500/50 flex flex-col items-center">
                            <div className="text-red-500 font-bold text-2xl mb-2 flex items-center gap-2">
                                <Skull size={32} /> MASSACRO ROUND {room.gameData.round - 1}
                            </div>
                            <div className="w-full space-y-3 mb-6">
                                {room.gameData.roundSummary.map((p, i) => (
                                    <div key={i} className="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/10">
                                        <div className="flex items-center gap-3">
                                            <span className="font-bold text-yellow-500 text-xl">#{i+1}</span>
                                            <img src={p.img} className="w-10 h-10 rounded-full border border-white/20" />
                                            <span className="font-bold">{p.name}</span>
                                        </div>
                                        <div className="font-bold text-red-400 text-xl">
                                            -{p.damageTakenRound} HP
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {isHost ? (
                                <button 
                                    onClick={dismissRoundSummary}
                                    className="bg-green-600 hover:bg-green-500 px-8 py-3 rounded-xl font-bold text-lg flex items-center gap-2 transition-transform hover:scale-105"
                                >
                                    <CheckCircle /> PROSEGUI ROUND
                                </button>
                            ) : (
                                <div className="text-gray-400 animate-pulse text-center">
                                    L'Host sta analizzando i danni...
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const Leaderboard = () => {
                const sortedPlayers = [...room.players].sort((a, b) => {
                    if (a.id === room.winnerId) return -1;
                    if (b.id === room.winnerId) return 1;
                    if (a.eliminatedRound !== b.eliminatedRound) {
                        return (b.eliminatedRound || 0) - (a.eliminatedRound || 0);
                    }
                    return b.score - a.score;
                });

                return (
                    <div className="w-full bg-black/40 p-4 rounded-xl mt-4">
                        <h3 className="text-xl font-bold mb-2 text-yellow-400 text-center">Classifica Finale</h3>
                        <div className="space-y-2">
                            {sortedPlayers.map((p, i) => (
                                <div key={i} className="flex items-center justify-between bg-white/5 p-2 rounded">
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold w-6">{i + 1}°</span>
                                        <img src={p.img} className="w-8 h-8 rounded-full"/>
                                        <span>{p.name}</span>
                                    </div>
                                    <div className="text-sm text-gray-300">
                                        {p.id === room.winnerId ? <span className="text-green-400 font-bold">VINCITORE</span> : `Eliminato Round ${p.eliminatedRound || '-'}`}
                                        <span className="ml-3 text-blue-400">({p.score} danni)</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl">
                    <div className="text-2xl font-bold text-center text-red-400 flex items-center gap-2"><Skull /> Battle Royale (Max HP: {room.config?.initialHp || 50})</div>
                    
                    {room.status === 'PLAYING' && <RoundSummaryBanner />}

                    <div className="glass-panel p-4 rounded text-center w-full min-h-[60px] flex flex-col items-center justify-center">
                        <div className="text-lg">{room.gameData.lastAction || "Preparatevi a combattere!"}</div>
                        {isMyTurn && turnPhase === 'TARGET' && (
                            <div className="text-yellow-400 font-bold animate-pulse mt-1">
                                HAI FATTO {currentDamage}! SELEZIONA CHI COLPIRE!
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 w-full">
                        {room.players.map((p, i) => {
                            const isTargetable = isMyTurn && turnPhase === 'TARGET' && p.status !== 'ELIMINATED' && p.id !== user.uid;
                            return (
                                <PlayerBadge 
                                    key={i} 
                                    player={p} 
                                    isCurrentTurn={i === room.gameData.currentTurnIndex} 
                                    isWinner={room.winnerId === p.id}
                                    canBeTargeted={isTargetable}
                                    onClick={isTargetable ? handleTargetClick : null}
                                    maxHp={room.config?.initialHp || 50}
                                />
                            );
                        })}
                    </div>

                    {room.status === 'PLAYING' && (
                        <div className="flex flex-col items-center mt-4 h-24 justify-end">
                            <div className="text-xl mb-4 text-yellow-300">
                                Turno di: <span className="font-bold">{currentPlayer.name}</span>
                            </div>
                            {isMyTurn && turnPhase === 'ROLL' && (
                                <button onClick={handleHumanRoll} disabled={rolling} className={`px-8 py-4 rounded-full font-bold text-xl flex items-center gap-3 transition-all ${rolling ? 'bg-gray-600 cursor-not-allowed' : 'bg-red-600 hover:bg-red-500 shadow-lg hover:shadow-red-500/50'}`}>
                                    <span className={rolling ? "dice-roll" : ""}>🎲</span> {rolling ? "Tirando..." : "TIRA PER ATTACCARE"}
                                </button>
                            )}
                            {isMyTurn && turnPhase === 'TARGET' && <div className="text-gray-300 text-sm">Clicca sull'immagine di un avversario per attaccare.</div>}
                            {!isMyTurn && <p className="text-gray-400 animate-pulse">In attesa della mossa...</p>}
                        </div>
                    )}

                    {room.status === 'GAME_OVER' && (
                        <>
                            <Leaderboard />
                            {room.hostId === user.uid && (
                                <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-green-600 hover:bg-green-500 px-6 py-2 rounded mt-6">
                                    Torna alla Lobby
                                </button>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const CursedDiceGame = ({ room, user, updateRoom }) => {
            const [rolling, setRolling] = useState(false);
            const [phase, setPhase] = useState('ROLL'); // ROLL, CHOICE, TARGET
            const [rollVal, setRollVal] = useState(null);
            const [targets, setTargets] = useState([]);
            const [subAction, setSubAction] = useState(null); // 'ATTACK', 'HEAL' for face 6

            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            // --- LEADERBOARD COMPONENT (Copia da Survival) ---
            const Leaderboard = () => {
                const sortedPlayers = [...room.players].sort((a, b) => {
                    if (a.id === room.winnerId) return -1;
                    if (b.id === room.winnerId) return 1;
                    if (a.eliminatedRound !== b.eliminatedRound) {
                        return (b.eliminatedRound || 0) - (a.eliminatedRound || 0);
                    }
                    return (b.hp || 0) - (a.hp || 0); // Tie-break con HP residui se morti nello stesso round (raro) o 0
                });

                return (
                    <div className="w-full bg-black/40 p-4 rounded-xl mt-4">
                        <h3 className="text-xl font-bold mb-2 text-yellow-400 text-center">Classifica Finale</h3>
                        <div className="space-y-2">
                            {sortedPlayers.map((p, i) => (
                                <div key={i} className="flex items-center justify-between bg-white/5 p-2 rounded">
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold w-6">{i + 1}°</span>
                                        <img src={p.img} className="w-8 h-8 rounded-full border border-white/10"/>
                                        <span>{p.name}</span>
                                    </div>
                                    <div className="text-sm text-gray-300">
                                        {p.id === room.winnerId ? <span className="text-green-400 font-bold">VINCITORE</span> : `Eliminato Round ${p.eliminatedRound || '-'}`}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const DICE_FACES = {
                1: { label: "💀 SACRIFICIO", desc: "-3 HP a te stesso", type: "IMMEDIATE" },
                2: { label: "🗡️ COLPO", desc: "-5 HP a un avversario", type: "TARGET", maxTargets: 1 },
                3: { label: "⚔️ MULTI-COLPO", desc: "-2 HP a 3 avversari", type: "TARGET", maxTargets: 3 },
                4: { label: "❤️ CURA", desc: "+2 HP", type: "IMMEDIATE" },
                5: { label: "🎯 CECCHINO", desc: "-8 HP a un avversario", type: "TARGET", maxTargets: 1 },
                6: { label: "☯️ KARMA", desc: "Attacca o Cura+Cura", type: "CHOICE" },
                7: { label: "🧨 ESPLOSIONE", desc: "-3 HP a 2 avversari", type: "TARGET", maxTargets: 2 },
                8: { label: "🛡️ SCUDO", desc: "Invulnerabile fino al prossimo turno", type: "IMMEDIATE" },
                9: { label: "🔪 PUGNALE", desc: "-4 HP a un avversario", type: "TARGET", maxTargets: 1 }
            };

            const handleRoll = async () => {
                if (rolling) return;
                setRolling(true);
                setRollVal(null);
                setTargets([]);
                setSubAction(null);

                await new Promise(r => setTimeout(r, 1000));
                
                const result = Math.ceil(Math.random() * 9);
                setRollVal(result);
                setRolling(false);

                const face = DICE_FACES[result];
                if (face.type === 'IMMEDIATE') {
                    executeEffect(result, []);
                } else if (face.type === 'CHOICE') {
                    setPhase('CHOICE');
                } else {
                    setPhase('TARGET');
                }
            };

            const handleChoice = (choice) => {
                setSubAction(choice);
                setPhase('TARGET');
            };

            const handleTargetClick = (player) => {
                if (phase !== 'TARGET' || !isMyTurn) return;
                if (player.id === user.uid && !(rollVal === 6 && subAction === 'HEAL' && targets.length > 0)) {
                    // Self targeting not allowed unless it's specific heal logic (but Face 6 heal says "qualcun altro OLTRE te")
                    // Wait, Face 6 Heal says: Heal self 5 AND choose another to heal 5. So self is auto, target is other.
                    return; 
                }

                if (targets.includes(player.id)) {
                    setTargets(targets.filter(id => id !== player.id));
                } else {
                    let max = DICE_FACES[rollVal]?.maxTargets || 1;
                    if (rollVal === 6) max = 1; // Both subactions require 1 target
                    
                    if (targets.length < max) {
                        setTargets([...targets, player.id]);
                    }
                }
            };

            const confirmTargets = () => {
                executeEffect(rollVal, targets, subAction);
            };

            const executeEffect = async (roll, selectedTargetIds, choice = null) => {
                let newPlayers = [...room.players];
                const currentPlayerIndex = room.gameData.currentTurnIndex;
                let me = newPlayers[currentPlayerIndex];
                let logMsg = `${me.name} rolla ${roll}: ${DICE_FACES[roll].label}. `;
                const currentRound = room.gameData.round || 1;

                // Helper to damage
                const dealDamage = (player, amount) => {
                    if (player.invulnerable) return 0;
                    const dmg = amount;
                    player.hp -= dmg;
                    return dmg;
                };

                // Helper to heal
                const heal = (player, amount) => {
                    const max = room.config?.initialHp || 50;
                    const oldHp = player.hp;
                    player.hp = Math.min(max, player.hp + amount);
                    return player.hp - oldHp;
                };

                if (roll === 1) { // Sacrificio
                    me.hp -= 3;
                    logMsg += `Perde 3 HP.`;
                } else if (roll === 2) { // Colpo
                    const target = newPlayers.find(p => p.id === selectedTargetIds[0]);
                    if (target) {
                        const dmg = dealDamage(target, 5);
                        logMsg += dmg > 0 ? `Infligge 5 danni a ${target.name}.` : `${target.name} è INVULNERABILE!`;
                    }
                } else if (roll === 3) { // Multi
                    const targetNames = [];
                    selectedTargetIds.forEach(id => {
                        const t = newPlayers.find(p => p.id === id);
                        if (t) {
                            dealDamage(t, 2);
                            targetNames.push(t.name);
                        }
                    });
                    logMsg += `Colpisce ${targetNames.join(', ')} per 2 danni.`;
                } else if (roll === 4) { // Cura
                    heal(me, 2);
                    logMsg += `Recupera 2 HP.`;
                } else if (roll === 5) { // Sniper
                    const target = newPlayers.find(p => p.id === selectedTargetIds[0]);
                    if (target) {
                        const dmg = dealDamage(target, 8);
                         logMsg += dmg > 0 ? `Cecchina ${target.name} per 8 danni!` : `${target.name} ha bloccato il colpo!`;
                    }
                } else if (roll === 6) { // Karma
                    const target = newPlayers.find(p => p.id === selectedTargetIds[0]);
                    if (choice === 'ATTACK') {
                        if (target) {
                            const dmg = dealDamage(target, 2);
                            logMsg += `Sceglie violenza! 2 danni a ${target.name}.`;
                        }
                    } else {
                        heal(me, 5);
                        if (target) heal(target, 5);
                        logMsg += `Sceglie pace! +5 HP a se stesso e a ${target ? target.name : 'nessuno'}.`;
                    }
                } else if (roll === 7) { // Esplosione
                    const targetNames = [];
                    selectedTargetIds.forEach(id => {
                        const t = newPlayers.find(p => p.id === id);
                        if (t) {
                            dealDamage(t, 3);
                            targetNames.push(t.name);
                        }
                    });
                    logMsg += `Esplosione su ${targetNames.join(', ')} (3 danni).`;
                } else if (roll === 8) { // Scudo
                    me.invulnerable = true;
                    logMsg += `È INVULNERABILE fino al prossimo turno!`;
                } else if (roll === 9) { // Pugnale
                     const target = newPlayers.find(p => p.id === selectedTargetIds[0]);
                    if (target) {
                        const dmg = dealDamage(target, 4);
                        logMsg += dmg > 0 ? `Pugnala ${target.name} (4 danni).` : `${target.name} schiva!`;
                    }
                }

                // Check Eliminazioni e set Eliminazione Round
                newPlayers.forEach(p => {
                    if (p.hp <= 0 && p.status !== 'ELIMINATED') {
                        p.hp = 0;
                        p.status = 'ELIMINATED';
                        p.eliminatedRound = currentRound; // Track round for leaderboard
                        logMsg += ` ${p.name} MUORE!`;
                    }
                });

                // Update Array (React State Immutability check)
                newPlayers = newPlayers.map(p => {
                   const updated = newPlayers.find(np => np.id === p.id);
                   return updated || p;
                });

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;
                let nextIndex = currentPlayerIndex;
                let nextRound = currentRound;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id;
                    logMsg += ` ${survivors[0]?.name} VINCE!`;
                } else {
                    let loops = 0;
                    do {
                        nextIndex = (nextIndex + 1) % newPlayers.length;
                        if(nextIndex === 0) nextRound++; // Increment round when looping back to player 0
                        loops++;
                    } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);

                    // Clear invulnerability for the NEXT player (it's their turn now)
                    if (newPlayers[nextIndex].invulnerable) {
                        newPlayers[nextIndex].invulnerable = false;
                        logMsg += ` (Scudo di ${newPlayers[nextIndex].name} scaduto)`;
                    }
                }

                setPhase('ROLL');
                setRollVal(null);
                setTargets([]);
                setSubAction(null);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    winnerId: winnerId,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: nextRound,
                        lastAction: logMsg,
                        lastRoll: roll
                    }
                });
            };

            // CPU Logic
            useEffect(() => {
                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING' && phase === 'ROLL') {
                    const runCpuTurn = async () => {
                         await new Promise(r => setTimeout(r, 1000));
                         // CPU Roll
                         const roll = Math.ceil(Math.random() * 9);
                         const face = DICE_FACES[roll];
                         
                         let cpuTargets = [];
                         let cpuChoice = null;

                         const enemies = room.players.filter(p => p.id !== currentPlayer.id && p.status !== 'ELIMINATED');
                         //const allies = enemies; // FFA

                         if (face.type === 'TARGET' || roll === 6) {
                             if (roll === 6) {
                                 // Decide healing vs attack
                                 cpuChoice = Math.random() > 0.5 ? 'ATTACK' : 'HEAL';
                             }

                             let count = face.maxTargets || 1;
                             if (roll === 6) count = 1;

                             // Simple random selection
                             let potentialTargets = enemies;
                             if (roll === 6 && cpuChoice === 'HEAL') {
                                 // Heal another
                                 potentialTargets = enemies; 
                             }

                             for (let i = 0; i < count; i++) {
                                 if (potentialTargets.length > 0) {
                                     const t = potentialTargets[Math.floor(Math.random() * potentialTargets.length)];
                                     cpuTargets.push(t.id);
                                     potentialTargets = potentialTargets.filter(pt => pt.id !== t.id);
                                 }
                             }
                         }

                         await executeEffect(roll, cpuTargets, cpuChoice);
                    };
                    runCpuTurn();
                }
            }, [room.gameData.currentTurnIndex, room.status, phase]); // Removed 'phase' dependency to avoid loops? No, added phase check inside

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl">
                    <div className="text-2xl font-bold text-center text-purple-400 flex items-center gap-2"><Dices /> Dadi Maledetti (9 Facce)</div>

                    <div className="glass-panel p-6 rounded-2xl text-center w-full min-h-[100px] flex flex-col items-center justify-center">
                        <div className="text-xl font-bold mb-2 text-purple-300">{room.gameData.lastAction || "Che il caos abbia inizio!"}</div>
                        {room.gameData.lastRoll && (
                            <div className="flex items-center gap-3 bg-white/10 px-4 py-2 rounded-lg border border-white/20">
                                <span className="text-2xl font-bold">{room.gameData.lastRoll}</span>
                                <span className="text-sm opacity-80">{DICE_FACES[room.gameData.lastRoll]?.label}</span>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 w-full">
                        {room.players.map((p, i) => {
                             const isTargetSelected = targets.includes(p.id);
                             const validTarget = phase === 'TARGET' && isMyTurn && p.id !== user.uid && p.status !== 'ELIMINATED';
                             // Special case for Heal 6 self+other logic handled in click handler

                             return (
                                <div key={i} className={`relative ${isTargetSelected ? 'ring-4 ring-red-500 rounded-xl' : ''}`}>
                                    <PlayerBadge 
                                        player={p} 
                                        isCurrentTurn={i === room.gameData.currentTurnIndex} 
                                        isWinner={room.winnerId === p.id}
                                        canBeTargeted={validTarget}
                                        onClick={handleTargetClick}
                                        maxHp={room.config?.initialHp || 50}
                                    />
                                </div>
                            );
                        })}
                    </div>

                    {room.status === 'PLAYING' && (
                        <div className="flex flex-col items-center mt-8 min-h-[150px] justify-end w-full">
                             <div className="text-xl mb-4 text-purple-300">
                                Turno di: <span className="font-bold">{currentPlayer.name}</span>
                            </div>
                            
                            {isMyTurn && phase === 'ROLL' && (
                                <button 
                                    onClick={handleRoll} 
                                    disabled={rolling}
                                    className={`w-24 h-24 rounded-2xl flex items-center justify-center text-4xl font-bold transition-all shadow-lg border-4
                                        ${rolling ? 'bg-gray-700 border-gray-500 cursor-not-allowed' : 'bg-purple-600 border-purple-400 hover:scale-110 hover:rotate-3'}
                                    `}
                                >
                                    <span className={rolling ? "animate-spin" : ""}>🎲</span>
                                </button>
                            )}

                            {isMyTurn && phase === 'CHOICE' && (
                                <div className="flex gap-4 animate-bounce-in">
                                    <button onClick={() => handleChoice('ATTACK')} className="bg-red-600 hover:bg-red-500 px-6 py-4 rounded-xl font-bold">
                                        🗡️ ATTACCA (-2 HP)
                                    </button>
                                    <button onClick={() => handleChoice('HEAL')} className="bg-green-600 hover:bg-green-500 px-6 py-4 rounded-xl font-bold">
                                        ❤️ CURA (+5 HP a te e altro)
                                    </button>
                                </div>
                            )}

                            {isMyTurn && phase === 'TARGET' && (
                                <div className="flex flex-col items-center gap-3 animate-bounce-in">
                                    <div className="text-lg font-bold text-yellow-400">
                                        {rollVal === 6 ? (subAction === 'ATTACK' ? "Scegli chi colpire!" : "Scegli chi altro curare!") : `Seleziona Bersagli: ${targets.length}/${DICE_FACES[rollVal]?.maxTargets}`}
                                    </div>
                                    <div className="text-sm opacity-70 mb-2">{DICE_FACES[rollVal]?.desc}</div>
                                    <button 
                                        onClick={confirmTargets}
                                        disabled={targets.length === 0} // Allow confirming even if less than max (e.g. if only 1 enemy left)
                                        className={`px-8 py-3 rounded-xl font-bold text-lg ${targets.length > 0 ? 'bg-blue-600 hover:bg-blue-500' : 'bg-gray-700 cursor-not-allowed'}`}
                                    >
                                        CONFERMA BERSAGLI
                                    </button>
                                </div>
                            )}

                            {!isMyTurn && <div className="text-gray-400 animate-pulse">Attendi...</div>}
                        </div>
                    )}

                    {/* MOSTRA CLASSIFICA A FINE GIOCO */}
                    {room.status === 'GAME_OVER' && (
                        <>
                            <Leaderboard />
                            {room.hostId === user.uid && (
                                <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-green-600 hover:bg-green-500 px-6 py-2 rounded mt-6">
                                    Torna alla Lobby
                                </button>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const DetonatorGame = ({ room, user, updateRoom }) => {
            const [pressing, setPressing] = useState(false);
            const [explosion, setExplosion] = useState(false);
            
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            // --- LEADERBOARD (Copia da altri giochi) ---
            const Leaderboard = () => {
                const sortedPlayers = [...room.players].sort((a, b) => {
                    if (a.id === room.winnerId) return -1;
                    if (b.id === room.winnerId) return 1;
                    if (a.eliminatedRound !== b.eliminatedRound) {
                        return (b.eliminatedRound || 0) - (a.eliminatedRound || 0);
                    }
                    return b.score - a.score;
                });

                return (
                    <div className="w-full bg-black/40 p-4 rounded-xl mt-4">
                        <h3 className="text-xl font-bold mb-2 text-yellow-400 text-center">Classifica Finale</h3>
                        <div className="space-y-2">
                            {sortedPlayers.map((p, i) => (
                                <div key={i} className="flex items-center justify-between bg-white/5 p-2 rounded">
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold w-6">{i + 1}°</span>
                                        <img src={p.img} className="w-8 h-8 rounded-full border border-white/10"/>
                                        <span>{p.name}</span>
                                    </div>
                                    <div className="text-sm text-gray-300">
                                        {p.id === room.winnerId ? <span className="text-green-400 font-bold">VINCITORE</span> : `Eliminato Round ${p.eliminatedRound || '-'}`}
                                        <span className="ml-3 text-blue-400">({p.score} PT)</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const handleTrigger = async () => {
                if (pressing) return;
                setPressing(true);
                setExplosion(false);

                // Suspense delay
                await new Promise(r => setTimeout(r, 1200));

                const currentRisk = room.gameData.risk || 10;
                const roll = Math.random() * 100;
                
                let newPlayers = [...room.players];
                const me = newPlayers[room.gameData.currentTurnIndex];
                let logMsg = "";
                let nextRisk = currentRisk;
                let survived = true;

                if (roll < currentRisk) {
                    // BOOM
                    setExplosion(true);
                    survived = false;
                    me.status = 'ELIMINATED';
                    me.eliminatedRound = room.gameData.round;
                    logMsg = `BOOM! ${me.name} è saltato in aria! (Rischio era ${currentRisk}%)`;
                    nextRisk = 10; // Reset risk
                    
                    // Delay for animation visibility
                    await new Promise(r => setTimeout(r, 1000));
                } else {
                    // Safe
                    me.score = (me.score || 0) + 50 + currentRisk;
                    logMsg = `CLICK! ${me.name} è salvo. (+${50+currentRisk} PT)`;
                    nextRisk = Math.min(95, currentRisk + 15);
                }

                const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                let nextStatus = 'PLAYING';
                let winnerId = null;
                let nextIndex = room.gameData.currentTurnIndex;
                let nextRound = room.gameData.round || 1;

                if (survivors.length <= 1) {
                    nextStatus = 'GAME_OVER';
                    winnerId = survivors[0]?.id;
                    logMsg += ` ${survivors[0]?.name} VINCE!`;
                } else {
                    let loops = 0;
                    do {
                        nextIndex = (nextIndex + 1) % newPlayers.length;
                        if(nextIndex === 0) nextRound++;
                        loops++;
                    } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                }

                setPressing(false);
                setExplosion(false);

                await updateRoom({
                    players: newPlayers,
                    status: nextStatus,
                    winnerId: winnerId,
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        round: nextRound,
                        risk: nextRisk,
                        lastAction: logMsg
                    }
                });
            };

            // CPU Logic
            useEffect(() => {
                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING') {
                    const timer = setTimeout(() => {
                        handleTrigger();
                    }, 1500);
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            const riskLevel = room.gameData.risk || 10;
            const riskColor = riskLevel < 30 ? 'text-green-500' : riskLevel < 60 ? 'text-yellow-500' : 'text-red-500 animate-pulse';

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-3xl">
                    <div className="text-2xl font-bold text-center text-red-500 flex items-center gap-2"><Power /> Il Detonatore</div>

                    <div className="glass-panel p-4 rounded-xl text-center w-full min-h-[80px] flex flex-col items-center justify-center">
                        <div className="text-lg">{room.gameData.lastAction || "Tocca a te... spera bene."}</div>
                    </div>

                    <div className="relative w-64 h-64 flex items-center justify-center">
                        {/* Background Pulse based on risk */}
                        <div className={`absolute inset-0 rounded-full transition-all duration-1000 opacity-20 ${riskLevel > 50 ? 'bg-red-500 animate-ping' : 'bg-transparent'}`} style={{ animationDuration: `${Math.max(0.2, 1 - riskLevel/100)}s` }}></div>

                        {isMyTurn && room.status === 'PLAYING' ? (
                            <button 
                                onClick={handleTrigger}
                                disabled={pressing}
                                className={`w-48 h-48 rounded-full border-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-all transform active:scale-95 flex flex-col items-center justify-center z-10
                                    ${pressing ? 'bg-gray-800 border-gray-600' : 'bg-gradient-to-br from-red-600 to-red-900 border-red-500 hover:scale-105'}
                                    ${explosion ? 'animate-bounce bg-white' : ''}
                                `}
                            >
                                {pressing ? (
                                    <span className="text-2xl font-mono animate-pulse">...</span>
                                ) : (
                                    <>
                                        <Power size={64} className="text-white mb-2" />
                                        <span className="text-xl font-bold text-white">PREMI</span>
                                    </>
                                )}
                            </button>
                        ) : (
                            <div className="w-48 h-48 rounded-full border-8 border-gray-700 bg-gray-900 flex flex-col items-center justify-center opacity-70">
                                <div className="text-gray-500 font-bold">ATTENDI</div>
                            </div>
                        )}
                    </div>

                    <div className="flex flex-col items-center">
                        <div className="text-sm uppercase tracking-widest text-gray-400">Probabilità Esplosione</div>
                        <div className={`text-5xl font-mono font-bold ${riskColor}`}>{riskLevel}%</div>
                    </div>

                    <div className="grid grid-cols-4 sm:grid-cols-6 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                             <div key={i} className={`flex flex-col items-center p-2 rounded glass-panel transition-all ${i === room.gameData.currentTurnIndex ? 'border border-yellow-500 bg-white/5' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                <img src={p.img} className="w-10 h-10 rounded-full border border-white/20"/>
                                <span className="text-xs font-bold truncate w-full mt-1 text-center">{p.name}</span>
                                {p.status !== 'ELIMINATED' && <span className="text-[10px] text-blue-400">{p.score} PT</span>}
                                {p.status === 'ELIMINATED' && <Skull size={12} className="text-red-500 mt-1"/>}
                            </div>
                        ))}
                    </div>
                    
                    {room.status === 'PLAYING' && !isMyTurn && (
                         <div className="text-yellow-400 animate-pulse mt-4">Tocca a {currentPlayer.name}...</div>
                    )}

                    {room.status === 'GAME_OVER' && (
                        <>
                            <Leaderboard />
                            {room.hostId === user.uid && (
                                <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-green-600 hover:bg-green-500 px-6 py-2 rounded mt-6">
                                    Torna alla Lobby
                                </button>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const ClickRaceGame = ({ room, user, updateRoom }) => {
            const [localScore, setLocalScore] = useState(0);
            
            useEffect(() => {
                if (room.hostId === user.uid && room.status === 'PLAYING' && room.gameData.raceStatus === 'GO') {
                    const interval = setInterval(() => {
                        const newPlayers = room.players.map(p => {
                            if (p.isCpu) {
                                return { ...p, score: (p.score || 0) + Math.floor(Math.random() * 5) + 1 };
                            }
                            return p;
                        });

                        updateRoom({
                            players: newPlayers,
                            gameData: { ...room.gameData, timeLeft: Math.max(0, (room.gameData.timeLeft || 10) - 1) }
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [room.status, room.gameData.raceStatus, room.gameData.timeLeft, room.players]);

            useEffect(() => {
                if (room.gameData.timeLeft === 0 && room.gameData.raceStatus === 'GO') {
                    if (room.hostId === user.uid) {
                        endGame();
                    }
                }
            }, [room.gameData.timeLeft]);

            const startGame = async () => {
                setLocalScore(0);
                await updateRoom({
                    gameData: { raceStatus: 'GO', timeLeft: 10 }
                });
            };

            const handleClick = () => {
                if (room.gameData.raceStatus === 'GO') {
                    setLocalScore(prev => prev + 1);
                }
            };

            const endGame = async () => {
                await updateRoom({
                    gameData: { ...room.gameData, raceStatus: 'CALCULATING', timeLeft: 0 }
                });
            };

            useEffect(() => {
                if (room.gameData.raceStatus === 'CALCULATING') {
                    const pushScore = async () => {
                        const myPlayer = room.players.find(p => p.id === user.uid);
                        if (!myPlayer) return;
                        
                        let updatedPlayers = [...room.players];
                        updatedPlayers = updatedPlayers.map(p => p.id === user.uid ? {...p, score: localScore} : p);
                        
                        if (room.hostId === user.uid) {
                            setTimeout(async () => {
                                const winner = updatedPlayers.reduce((max, p) => (p.score || 0) > (max.score || 0) ? p : max, updatedPlayers[0]);
                                await updateRoom({
                                    players: updatedPlayers,
                                    status: 'GAME_OVER',
                                    winnerId: winner.id,
                                    gameData: { ...room.gameData, raceStatus: 'FINISHED' }
                                });
                            }, 1000);
                        } else {
                             await updateRoom({ players: updatedPlayers });
                        }
                    };
                    pushScore();
                }
            }, [room.gameData.raceStatus]);

            const RaceLeaderboard = () => {
                const sortedPlayers = [...room.players].sort((a, b) => (b.score || 0) - (a.score || 0));

                return (
                    <div className="w-full bg-black/40 p-4 rounded-xl mt-4 max-h-[300px] overflow-y-auto">
                        <h3 className="text-xl font-bold mb-2 text-pink-400 text-center">Risultati Finali</h3>
                        <div className="space-y-2">
                            {sortedPlayers.map((p, i) => (
                                <div key={i} className="flex items-center justify-between bg-white/5 p-2 rounded">
                                    <div className="flex items-center gap-2">
                                        <span className={`font-bold w-6 ${i===0 ? 'text-yellow-400 text-xl' : ''}`}>{i + 1}°</span>
                                        <img src={p.img} className="w-8 h-8 rounded-full border border-white/20"/>
                                        <span className={i===0 ? 'font-bold text-yellow-400' : ''}>{p.name}</span>
                                        {p.isCpu && <span className="text-[9px] bg-purple-600 px-1 rounded text-white">CPU</span>}
                                    </div>
                                    <div className="text-xl font-bold text-white">
                                        {p.score || 0}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold text-pink-400 flex items-center gap-2"><Zap /> Corsa dei Click</div>
                    
                    {room.status === 'GAME_OVER' ? (
                        <>
                            <div className="animate-bounce text-2xl font-bold text-yellow-400">
                                VINCITORE: {room.players.find(p => p.id === room.winnerId)?.name}
                            </div>
                            <RaceLeaderboard />
                        </>
                    ) : (
                        <div className="text-6xl font-mono font-bold text-white mb-4">
                            {room.gameData.timeLeft}s
                        </div>
                    )}

                    {room.gameData.raceStatus === 'GO' && (
                        <button 
                            onClick={handleClick}
                            className="w-48 h-48 rounded-full bg-red-600 border-8 border-red-800 text-white font-bold text-2xl shadow-[0_0_50px_rgba(255,0,0,0.5)] click-btn transition-transform relative"
                        >
                            CLICK!
                            <div className="text-4xl mt-2">{localScore}</div>
                        </button>
                    )}

                    {room.gameData.raceStatus === 'READY' && room.hostId === user.uid && (
                        <button onClick={startGame} className="bg-green-600 px-8 py-4 rounded-xl text-xl font-bold animate-pulse">
                            INIZIA GARA
                        </button>
                    )}
                    
                    {room.gameData.raceStatus === 'READY' && room.hostId !== user.uid && (
                         <div className="text-xl">L'Host sta per avviare la gara... preparati!</div>
                    )}

                    {room.gameData.raceStatus === 'CALCULATING' && (
                        <div className="text-xl animate-pulse">Calcolo risultati...</div>
                    )}

                    {room.status === 'GAME_OVER' && room.hostId === user.uid && (
                        <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-green-600 hover:bg-green-500 px-6 py-2 rounded mt-6">
                            Torna alla Lobby
                        </button>
                    )}
                </div>
            );
        };

        const HotPotatoGame = ({ room, user, updateRoom }) => {
            const currentPlayer = room.players[room.gameData.currentTurnIndex];
            const isMyTurn = currentPlayer.id === user.uid;
            const isHost = room.hostId === user.uid;

            useEffect(() => {
                if (isHost && room.status === 'PLAYING') {
                    const interval = setInterval(async () => {
                        if (Date.now() > room.gameData.explosionTime) {
                            let newPlayers = [...room.players];
                            const victim = newPlayers[room.gameData.currentTurnIndex];
                            
                            victim.status = 'ELIMINATED';
                            const logMsg = `BOOM! ${victim.name} è esploso!`;

                            const survivors = newPlayers.filter(p => p.status !== 'ELIMINATED');
                            let nextStatus = 'PLAYING';
                            let winnerId = null;

                            if (survivors.length <= 1) {
                                nextStatus = 'GAME_OVER';
                                winnerId = survivors[0]?.id;
                            }

                            let nextIndex = room.gameData.currentTurnIndex;
                            if (survivors.length > 0) {
                                let loops = 0;
                                do {
                                    nextIndex = (nextIndex + 1) % newPlayers.length;
                                    loops++;
                                } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);
                            }

                            const newExplosionTime = Date.now() + Math.floor(Math.random() * 20000) + 10000;

                            await updateRoom({
                                players: newPlayers,
                                status: nextStatus,
                                winnerId: winnerId,
                                gameData: {
                                    ...room.gameData,
                                    currentTurnIndex: nextIndex,
                                    lastAction: logMsg,
                                    explosionTime: newExplosionTime
                                }
                            });
                        }
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [isHost, room.status, room.gameData.explosionTime]);

            useEffect(() => {
                if (currentPlayer.isCpu && isHost && room.status === 'PLAYING') {
                    const passTimer = setTimeout(() => {
                        handlePass();
                    }, 1500 + Math.random() * 2000); 
                    return () => clearTimeout(passTimer);
                }
            }, [room.gameData.currentTurnIndex, room.status]);

            const handlePass = async () => {
                let newPlayers = [...room.players];
                let nextIndex = room.gameData.currentTurnIndex;
                let loops = 0;
                
                do {
                    nextIndex = (nextIndex + 1) % newPlayers.length;
                    loops++;
                } while (newPlayers[nextIndex].status === 'ELIMINATED' && loops < newPlayers.length * 2);

                await updateRoom({
                    gameData: {
                        ...room.gameData,
                        currentTurnIndex: nextIndex,
                        lastAction: `${currentPlayer.name} ha passato la bomba!`
                    }
                });
            };

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center relative">
                    <div className="absolute inset-0 pointer-events-none bg-red-500/10 pulse-red z-0 rounded-3xl"></div>
                    <div className="text-2xl font-bold text-red-500 flex items-center gap-2 z-10"><Bomb /> Bomba a Tempo</div>
                    
                    <div className="glass-panel p-4 rounded text-center w-full min-h-[60px] flex flex-col items-center justify-center z-10 relative">
                        <div className="text-lg font-bold animate-pulse text-red-400">
                             {room.gameData.lastAction || "La miccia è accesa..."}
                        </div>
                    </div>

                    <div className="grid grid-cols-4 sm:grid-cols-5 gap-4 w-full z-10">
                        {room.players.map((p, i) => {
                             const hasBomb = room.gameData.currentTurnIndex === i && room.status === 'PLAYING';
                             return (
                                <div key={i} className={`relative flex flex-col items-center p-2 rounded glass-panel transition-all ${hasBomb ? 'scale-110 border-2 border-red-500 bg-red-900/40' : ''} ${p.status === 'ELIMINATED' ? 'opacity-30 grayscale' : ''}`}>
                                    {hasBomb && <div className="absolute -top-6 text-4xl bomb-shake">💣</div>}
                                    <img src={p.img} className="w-12 h-12 rounded-full border border-white/20"/>
                                    <span className="text-xs font-bold truncate w-full mt-1">{p.name}</span>
                                    {p.status === 'ELIMINATED' && <span className="text-red-500 text-xs font-bold uppercase">Esploso</span>}
                                </div>
                            );
                        })}
                    </div>

                    <div className="z-10 mt-8 h-24 flex items-center justify-center">
                        {isMyTurn && room.status === 'PLAYING' && (
                             <button 
                                onClick={handlePass}
                                className="bg-red-600 hover:bg-red-500 px-8 py-6 rounded-2xl text-2xl font-bold shadow-[0_0_30px_rgba(255,0,0,0.6)] animate-bounce"
                            >
                                PASSA LA BOMBA! 💣
                            </button>
                        )}
                        {!isMyTurn && room.status === 'PLAYING' && (
                            <div className="text-xl font-mono text-red-300">
                                TIC... TOC... TIC... TOC...
                            </div>
                        )}
                    </div>

                    {room.status === 'GAME_OVER' && room.hostId === user.uid && (
                        <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-green-600 hover:bg-green-500 px-6 py-2 rounded mt-6 z-10">
                            Lobby
                        </button>
                    )}
                    
                    {room.status === 'GAME_OVER' && (
                         <div className="z-10 text-2xl font-bold text-green-400 mt-4">
                            VINCITORE: {room.players.find(p => p.id === room.winnerId)?.name} 🏆
                        </div>
                    )}
                </div>
            );
        };

        const ReactionGame = ({ room, user, updateRoom }) => {
            const [localFrozen, setLocalFrozen] = useState(false);

            // Host logic to control lights
            useEffect(() => {
                if (room.hostId === user.uid && room.gameData.status === 'WAITING') {
                    const timer = setTimeout(() => {
                        updateRoom({
                            gameData: { ...room.gameData, status: 'GO', startTime: Date.now() }
                        });
                    }, 2000 + Math.random() * 4000); // 2-6s random
                    return () => clearTimeout(timer);
                }
            }, [room.gameData.status]);

            // CPU Logic
            useEffect(() => {
                if (room.hostId === user.uid && room.gameData.status === 'GO' && !room.gameData.roundWinner) {
                    // Check if CPU wins
                    const cpuPlayers = room.players.filter(p => p.isCpu);
                    if (cpuPlayers.length > 0) {
                         const timer = setTimeout(() => {
                             if(!room.gameData.roundWinner) {
                                 const winner = cpuPlayers[Math.floor(Math.random() * cpuPlayers.length)];
                                 handleWin(winner);
                             }
                         }, 200 + Math.random() * 500); // 200-700ms reaction
                         return () => clearTimeout(timer);
                    }
                }
            }, [room.gameData.status]);

            const handleClick = () => {
                if (localFrozen || room.gameData.roundWinner) return;

                if (room.gameData.status === 'WAITING') {
                    setLocalFrozen(true); // False start penalty
                    return;
                }

                if (room.gameData.status === 'GO') {
                    const myPlayer = room.players.find(p => p.id === user.uid);
                    handleWin(myPlayer);
                }
            };

            const handleWin = async (winner) => {
                if(room.gameData.roundWinner) return; // Already won

                let newPlayers = room.players.map(p => p.id === winner.id ? {...p, score: (p.score||0) + 1} : p);
                
                await updateRoom({
                    players: newPlayers,
                    gameData: { ...room.gameData, roundWinner: winner.id, roundWinnerName: winner.name, status: 'RESULT' }
                });
            };

            const startRound = async () => {
                setLocalFrozen(false);
                await updateRoom({
                    gameData: { status: 'WAITING', roundWinner: null }
                });
            };

            const isRed = room.gameData.status === 'WAITING';
            const isGreen = room.gameData.status === 'GO';
            const isResult = room.gameData.status === 'RESULT';

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold flex items-center gap-2 text-white"><Eye /> Riflessi Lampo</div>
                    
                    <div 
                        onClick={handleClick}
                        className={`w-full h-64 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all shadow-2xl
                            ${isRed ? 'bg-red-600 hover:bg-red-700' : ''}
                            ${isGreen ? 'bg-green-500 scale-105' : ''}
                            ${isResult ? 'bg-gray-800' : ''}
                            ${localFrozen ? 'opacity-50 cursor-not-allowed' : ''}
                        `}
                    >
                        {isRed && <div className="text-4xl font-bold text-white animate-pulse">{localFrozen ? "BLOCCATO (Falsa Partenza)" : "ATTENDI..."}</div>}
                        {isGreen && <div className="text-6xl font-bold text-white">CLICCA!!!</div>}
                        {isResult && (
                            <div className="text-white">
                                <div className="text-2xl">Vincitore Round:</div>
                                <div className="text-4xl font-bold text-yellow-400">{room.gameData.roundWinnerName}</div>
                            </div>
                        )}
                        {!isRed && !isGreen && !isResult && <div className="text-xl">Premi start per iniziare</div>}
                    </div>

                    <div className="grid grid-cols-4 gap-2 w-full mt-4">
                        {room.players.map((p, i) => (
                            <div key={i} className="flex flex-col items-center glass-panel p-2 rounded">
                                <img src={p.img} className="w-8 h-8 rounded-full"/>
                                <span className="text-xs truncate w-full">{p.name}</span>
                                <span className="font-bold text-yellow-400">{p.score} PT</span>
                            </div>
                        ))}
                    </div>

                    {room.hostId === user.uid && (
                        <div className="flex gap-4 mt-6">
                            <button onClick={startRound} className="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold">
                                {isResult ? "Prossimo Round" : "Inizia Round"}
                            </button>
                            <button onClick={() => updateRoom({ status: 'LOBBY', winnerId: null })} className="bg-gray-600 hover:bg-gray-500 px-6 py-3 rounded-xl font-bold">
                                Lobby
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const MathGame = ({ room, user, updateRoom }) => {
            const [localFrozen, setLocalFrozen] = useState(false);

            const generateQuestion = () => {
                const ops = ['+', '-', '*'];
                const op = ops[Math.floor(Math.random() * ops.length)];
                let a, b;

                // Logica Hard Mode
                if (op === '+') {
                    a = Math.floor(Math.random() * 90) + 10; // 10 a 99
                    b = Math.floor(Math.random() * 90) + 10;
                } else if (op === '-') {
                    a = Math.floor(Math.random() * 90) + 10;
                    b = Math.floor(Math.random() * 90) + 10;
                } else { // '*'
                    a = Math.floor(Math.random() * 13) + 3; // 3 a 15
                    b = Math.floor(Math.random() * 13) + 3;
                }
                
                let ans = 0;
                if (op === '+') ans = a + b;
                if (op === '-') ans = a - b;
                if (op === '*') ans = a * b;

                // Generate wrong options close to the real answer to be tricky
                let options = new Set([ans]);
                while(options.size < 4) {
                    // Deviazione piccola (-5 a +5) per confondere
                    let deviation = Math.floor(Math.random() * 11) - 5; 
                    if (deviation === 0) deviation = 1;
                    
                    // Ogni tanto una deviazione più ampia (-20 a +20)
                    if (Math.random() > 0.7) deviation = Math.floor(Math.random() * 41) - 20;

                    let fake = ans + deviation;
                    if(fake !== ans) options.add(fake);
                }
                
                return { 
                    text: `${a} ${op} ${b} = ?`, 
                    ans: ans, 
                    options: Array.from(options).sort(() => Math.random() - 0.5) 
                };
            };

            const startRound = async () => {
                const q = generateQuestion();
                await updateRoom({
                    gameData: { 
                        question: q.text, 
                        answer: q.ans, 
                        options: q.options, 
                        roundWinner: null 
                    }
                });
            };

            const handleOptionClick = (val) => {
                if (localFrozen || room.gameData.roundWinner) return;

                if (val === room.gameData.answer) {
                    const myPlayer = room.players.find(p => p.id === user.uid);
                    handleWin(myPlayer);
                } else {
                    setLocalFrozen(true);
                    setTimeout(() => setLocalFrozen(false), 2000); // Freeze 2s
                }
            };

            const handleWin = async (winner) => {
                if(room.gameData.roundWinner) return;

                let newPlayers = room.players.map(p => p.id === winner.id ? {...p, score: (p.score||0) + 10} : p);
                
                await updateRoom({
                    players: newPlayers,
                    gameData: { ...room.gameData, roundWinner: winner.id, roundWinnerName: winner.name }
                });
            };

            // CPU Logic
            useEffect(() => {
                if (room.hostId === user.uid && !room.gameData.roundWinner && room.gameData.question) {
                     const cpuPlayers = room.players.filter(p => p.isCpu);
                     if (cpuPlayers.length > 0) {
                         const timer = setTimeout(() => {
                             if(!room.gameData.roundWinner) {
                                 // CPU has 30% chance to be wrong or slow, simplifying to just winning sometimes
                                 if (Math.random() > 0.3) {
                                     const winner = cpuPlayers[Math.floor(Math.random() * cpuPlayers.length)];
                                     handleWin(winner);
                                 }
                             }
                         }, 2000 + Math.random() * 3000);
                         return () => clearTimeout(timer);
                     }
                }
            }, [room.gameData.question, room.gameData.roundWinner]);


            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl text-center">
                    <div className="text-2xl font-bold flex items-center gap-2 text-pink-400"><Brain /> Matematica Folle</div>

                    <div className="w-full glass-panel p-8 rounded-2xl mb-4">
                        {room.gameData.roundWinner ? (
                            <div className="animate-bounce">
                                <div className="text-xl">Risposta Corretta!</div>
                                <div className="text-3xl font-bold text-green-400">{room.gameData.answer}</div>
                                <div className="mt-2 text-yellow-400 font-bold">{room.gameData.roundWinnerName} vince!</div>
                            </div>
                        ) : (
                            <div className="text-5xl font-mono font-bold text-white tracking-wider">
                                {room.gameData.question || "Pronti?"}
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-2 gap-4 w-full">
                        {room.gameData.options?.map((opt, i) => (
                            <button 
                                key={i}
                                onClick={() => handleOptionClick(opt)}
                                disabled={!!room.gameData.roundWinner || localFrozen}
                                className={`h-20 text-3xl font-bold rounded-xl transition-transform hover:scale-105 active:scale-95
                                    ${room.gameData.roundWinner && opt === room.gameData.answer ? 'bg-green-600' : 'bg-blue-600 hover:bg-blue-500'}
                                    ${localFrozen ? 'bg-gray-600 opacity-50' : ''}
                                `}
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    {localFrozen && <div className="text-red-500 font-bold animate-pulse">SBAGLIATO! (Bloccato 2s)</div>}

                    <div className="grid grid-cols-4 gap-2 w-full mt-8">
                        {room.players.map((p, i) => (
                            <div key={i} className="flex flex-col items-center glass-panel p-2 rounded">
                                <img src={p.img} className="w-8 h-8 rounded-full"/>
                                <span className="text-xs truncate w-full">{p.name}</span>
